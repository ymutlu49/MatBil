name = "matbil-code-api"
main = "src/index.ts"
compatibility_date = "2025-01-17"
compatibility_flags = ["nodejs_compat"]

# D1 veritabanı bağlantısı — `wrangler d1 create matbil_codes` sonrası
# buradaki database_id değerini çıkan UUID ile değiştir.
[[d1_databases]]
binding = "DB"
database_name = "matbil_codes"
database_id = "00000000-0000-0000-0000-000000000000"

# Çevre değişkenleri (secret'ları 'wrangler secret put ...' ile koy)
[vars]
ALLOWED_ORIGIN = "https://ymutlu49.github.io"
MAX_DEVICES_PER_CODE = "3"

# Rate limit — Cloudflare'in yerleşik Rate Limiting (opsiyonel, Workers Paid plan)
# Boş bırakılırsa Hono middleware'i kullanılır
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 10, period = 60 }
