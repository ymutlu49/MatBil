              <div className={`p-3 rounded-lg text-sm ${cat.level === 'strong' ? 'bg-green-50 text-green-800' : cat.level === 'moderate' ? 'bg-amber-50 text-amber-800' : 'bg-red-50 text-red-800'}`}>
                <strong>Değerlendirme:</strong> {cat.level !== 'strong' ? cat.chapter.weakMsg : cat.chapter.strongMsg}
              </div>

              {/* Oyun detayları */}
              <div className="mt-3">
                <table className="w-full text-sm">
                  <thead><tr className="text-left text-gray-500 border-b">
                    <th className="pb-1">Oyun</th><th className="pb-1 text-center">En İyi Puan</th><th className="pb-1 text-center">Maks. Seviye</th><th className="pb-1 text-center">Yıldız</th><th className="pb-1 text-center">Deneme</th>
                  </tr></thead>
                  <tbody>
                    {cat.catGames.map(([id, g]) => {
                      const p = progress[id];
                      return (
                        <tr key={id} className="border-b border-gray-100">
                          <td className="py-1">{g.emoji} {g.name}</td>
                          <td className="py-1 text-center">{p ? p?.bestScore : '-'}</td>
                          <td className="py-1 text-center">{p ? `${p?.maxLevel || 1}/${g.levels.length}` : '-'}</td>
                          <td className="py-1 text-center">{p ? '⭐'.repeat(p?.stars || 0) + '☆'.repeat(3-(p?.stars||0)) : '---'}</td>
                          <td className="py-1 text-center">{p ? p?.attempts : 0}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Kaynaklar */}
              <div className="text-xs text-gray-400 mt-2 italic">Kaynaklar: {cat.chapter.refs}</div>
            </div>
          ))}
        </div>

        {/* ===== ÖNERİLER ===== */}
        <div className="print-break mb-8">
          <h3 className="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-4">3. Genel Değerlendirme ve Öneriler</h3>
          <div className="bg-blue-50 p-5 rounded-xl mb-4">
            <h4 className="font-bold text-blue-800 mb-2">🎯 Güçlü Alanlar</h4>
            <ul className="text-sm text-blue-700 space-y-1">
              {catAnalysis.filter(c => c.level === 'strong').map(c => (
                <li key={c.id}>✓ {c.name}: {c.catPct}% başarı oranıyla güçlü performans</li>
              ))}
              {catAnalysis.filter(c => c.level === 'strong').length === 0 && <li>Henüz güçlü performans düzeyine ulaşılmamış. Düzenli çalışma ile tüm alanlarda gelişim sağlanabilir.</li>}
            </ul>
          </div>
          <div className="bg-amber-50 p-5 rounded-xl mb-4">
            <h4 className="font-bold text-amber-800 mb-2">⚠️ Geliştirilmesi Gereken Alanlar</h4>
            <ul className="text-sm text-amber-700 space-y-1">
              {catAnalysis.filter(c => c.level !== 'strong').map(c => (
                <li key={c.id}>△ {c.name} ({c.catPct}%): {c.chapter.weakMsg.split('.')[0]}.</li>
              ))}
            </ul>
          </div>
          <div className="bg-gray-50 p-5 rounded-xl">
            <h4 className="font-bold text-gray-800 mb-2">📋 Müdahale Önerileri</h4>
            <div className="text-sm text-gray-700 space-y-2">
              <p>1. <strong>Somut-Temsili-Soyut (CRA) çerçevesi</strong> kullanılarak, önce manipülatiflerle, sonra görsel temsillerle, en son sembolik düzeyde çalışmalar yapılmalıdır.</p>
              <p>2. <strong>Çoklu temsil</strong> yaklaşımı benimsenerek her kavram; nesne, resim, diyagram, sembol ve sözel ifade düzeylerinde ele alınmalıdır.</p>
              <p>3. <strong>Düzenli değerlendirme</strong> ile ilerleme izlenmeli ve etkinlikler öğrencinin gelişim düzeyine göre uyarlanmalıdır.</p>
              {catAnalysis.some(c => c.level === 'weak' && c.id === 'A') && <p>4. <strong>Sanbil müdahalesi öncelikli:</strong> Nokta dizileri ve yapılandırılmış çerçevelerle anlık miktar algısı güçlendirilmelidir (Bölüm 4).</p>}
              {catAnalysis.some(c => c.level === 'weak' && c.id === 'D') && <p>4. <strong>Uzamsal beceri desteği:</strong> Tangram, blok oyunları ve zihinsel döndürme etkinlikleri ile geometrik düşünme desteklenmelidir (Bölüm 6-8).</p>}
            </div>
          </div>
        </div>

        {/* Footer */}
        <div className="text-center border-t-2 border-gray-200 pt-6 mt-8">
          <p className="text-sm font-semibold text-gray-600">Matematiksel Bilişin Temelleri — Bireysel Performans Raporu</p>
          <p className="text-xs text-gray-400 mt-1">Prof. Dr. Yılmaz Mutlu • Prof. Dr. Sinan Olkun</p>
          <p className="text-xs text-gray-400">Rapor tarihi: {reportDate} • v14.0</p>
          <p className="text-[10px] text-gray-300 mt-2">Bu rapor, öğrencinin uygulama içi performansına dayalı otomatik olarak oluşturulmuştur ve klinik tanı aracı değildir.</p>
        </div>
      </div>
    </div>
  );
};

const ReportScreen = ({ user, progress, onBack, onPDF }) => {
  const totalGames = Object.keys(GAMES).length;
  const playedGames = Object.keys(progress).length;
  const allScores = Object.values(progress);
  const totalAttempts = allScores.reduce((s, g) => s + (g.attempts || 0), 0);
  const avgScore = allScores.length > 0 ? Math.round(allScores.reduce((s, g) => s + (g.bestScore || 0), 0) / allScores.length) : 0;
  const totalStars = allScores.reduce((s, g) => s + (g.stars || 0), 0);
  const maxStars = totalGames * 3;

  // Kategori bazlı analiz
  const catStats = CATEGORIES.map(cat => {
    const catGames = Object.entries(GAMES).filter(([, g]) => g.cat === cat.id);
    const catPlayed = catGames.filter(([id]) => progress[id]);
    const catAvg = catPlayed.length > 0 ? Math.round(catPlayed.reduce((s, [id]) => s + (progress[id]?.bestScore || 0), 0) / catPlayed.length) : 0;
    const catStars = catPlayed.reduce((s, [id]) => s + (progress[id]?.stars || 0), 0);
    return { ...cat, total: catGames.length, played: catPlayed.length, avg: catAvg, stars: catStars, maxStars: catGames.length * 3 };
  });

  // Öğretmen notları
  const [teacherNote, setTeacherNote] = useState(() => { try { return localStorage.getItem(`matbil_note_${user?.name}`) || ''; } catch { return ''; } });
  const saveNote = (txt) => { setTeacherNote(txt); try { localStorage.setItem(`matbil_note_${user?.name}`, txt); } catch {} };

  // Son oynanan oyunlar (kronolojik)
  const recentPlays = Object.entries(progress)
    .filter(([, d]) => d.lastPlayed)
    .sort(([, a], [, b]) => new Date(b.lastPlayed) - new Date(a.lastPlayed))
    .slice(0, 8);

  return (
    <div className="h-screen bg-gradient-to-b from-blue-50 to-indigo-50 flex flex-col overflow-hidden">
      {/* Header (SABİT) */}
      <div className="shrink-0 p-3 pb-0">
        <div className="max-w-lg mx-auto flex items-center justify-between mb-2">
          <button onClick={onBack} className="px-3 py-1.5 bg-white text-gray-600 rounded-lg font-bold shadow text-sm hover:bg-gray-50">← Geri</button>
          <h2 className="text-base font-bold text-gray-700">📊 Gelişim Raporu</h2>
          {onPDF && <button onClick={onPDF} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg font-bold shadow hover:bg-indigo-700 text-sm">📄 PDF</button>}
        </div>
      </div>

      {/* İçerik (KAYDIRILAN) */}
      <div className="flex-1 min-h-0 overflow-y-auto scroll-area p-3 pt-1">
        <div className="max-w-lg mx-auto">
        {/* Öğrenci Bilgisi */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center text-white text-xl font-bold">{user.name.charAt(0).toUpperCase()}</div>
            <div className="flex-1">
              <h3 className="font-bold text-gray-800">{user.name}</h3>
              {(user.age || user.city) && <p className="text-xs text-gray-500">{user.age && `${user.age} yaş`}{user.age && user.city && ' • '}{user.city || ''}</p>}
            </div>
            <div className="text-right">
              <div className="text-xl font-bold text-yellow-600">⭐ {totalStars}</div>
              <div className="text-[10px] text-gray-400">/ {maxStars}</div>
            </div>
          </div>
        </div>

        {/* Genel İstatistikler */}
        <div className="grid grid-cols-3 gap-2 mb-3">
          <div className="bg-white rounded-lg shadow p-2 text-center">
            <div className="text-xl font-bold text-indigo-600">{playedGames}</div>
            <div className="text-[10px] text-gray-500">/ {totalGames} Oyun</div>
          </div>
          <div className="bg-white rounded-lg shadow p-2 text-center">
            <div className="text-xl font-bold text-green-600">{totalAttempts}</div>
            <div className="text-[10px] text-gray-500">Deneme</div>
          </div>
          <div className="bg-white rounded-lg shadow p-2 text-center">
            <div className="text-xl font-bold text-amber-600">{avgScore}</div>
            <div className="text-[10px] text-gray-500">Ort. Puan</div>
          </div>
        </div>


        {/* 🧠 ÜKM (Üçlü Kodlama Modeli) Profili */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">🧠 Bilişsel Profil (Üçlü Kodlama Modeli)</h3>
          {(() => {
            const codeMap = {
              analog: {name:'Analog Büyüklük', emoji:'🔵', games:['A1','A2','A3','A4','A5','B1','B3'], desc:'Nicelik algısı ve sanbil'},
              sozel: {name:'Sözel-İşitsel Kod', emoji:'🟢', games:['C5','E1','E2'], desc:'Sayı sözcükleri ve aritmetik bellek'},
              gorsel: {name:'Görsel-Sembolik Kod', emoji:'🟣', games:['C1','C2','C3','C4','B2','B5'], desc:'Rakam tanıma ve basamak değeri'},
            };
            const profiles = Object.entries(codeMap).map(([key,cfg]) => {
              const played = cfg.games.filter(id => progress[id]);
              const avg = played.length > 0 ? Math.round(played.reduce((s,id) => s + (progress[id]?.bestScore||0), 0) / played.length) : 0;
              const stars = played.reduce((s,id) => s + (progress[id]?.stars||0), 0);
              const maxStars = cfg.games.length * 3;
              const pct = maxStars > 0 ? Math.round((stars / maxStars) * 100) : 0;
              return {key,played:played.length,total:cfg.games.length,avg,stars,maxStars,pct,...cfg};
            });
            const anyPlayed = profiles.some(p => p.played > 0);
            if(!anyPlayed) return <div className="text-xs text-gray-400 text-center py-2">Henüz yeterli veri yok. Daha fazla oyun oynayın.</div>;
            const colors = {analog:'#3B82F6',sozel:'#10B981',gorsel:'#8B5CF6'};
            return (<div>
              <svg viewBox="0 0 300 100" className="w-full mb-2">
                {profiles.map((p,i) => {
                  const bw=80,gap=20,x=gap+i*(bw+gap),maxH=65;
                  const h=Math.max(3,p.pct/100*maxH);
                  return (<g key={p.key}>
                    <rect x={x} y={80-h} width={bw} height={h} rx="4" fill={colors[p.key]} opacity="0.8"/>
                    <text x={x+bw/2} y={75-h} textAnchor="middle" fontSize="9" fill="#374151" fontWeight="bold">{p.pct}%</text>
                    <text x={x+bw/2} y={95} textAnchor="middle" fontSize="8" fill="#6B7280">{p.emoji} {p.name.split(' ')[0]}</text>
                  </g>);
                })}
                <line x1="15" y1="80" x2="285" y2="80" stroke="#E5E7EB" strokeWidth="1"/>
              </svg>
              <div className="space-y-1.5">
                {profiles.map(p => (
                  <div key={p.key} className="flex items-center gap-2 text-xs">
                    <span>{p.emoji}</span>
                    <div className="flex-1">
                      <div className="font-medium text-gray-700">{p.name}</div>
                      <div className="text-[10px] text-gray-400">{p.desc}</div>
                    </div>
                    <div className="text-right">
                      <div className="font-bold" style={{color:colors[p.key]}}>{p.pct}%</div>
                      <div className="text-[10px] text-gray-400">{p.played}/{p.total}</div>
                    </div>
                  </div>
                ))}
              </div>
              {(() => {
                const weakest = profiles.filter(p=>p.played>0).sort((a,b)=>a.pct-b.pct)[0];
                if(weakest && weakest.pct < 60) return (
                  <div className="mt-2 bg-blue-50 p-2 rounded-lg text-xs text-blue-700">
                    📋 <strong>Öneri:</strong> {weakest.name} alanını güçlendirmek için {weakest.games.slice(0,2).map(id=>GAMES[id]?.name).filter(Boolean).join(' ve ')} oyunlarına odaklanın.
                  </div>
                );
                return null;
              })()}
            </div>);
          })()}
        </div>


        {/* 🔬 MacDonald-Wilkins Sanbil Düzeyi */}
        {(() => {
          const sanbilGames = ['A1','A2','A3','A4','A5'];
          const played = sanbilGames.filter(id => progress[id]);
          if(played.length < 2) return null;
          const avgStars = played.reduce((s,id) => s + (progress[id]?.stars||0), 0) / played.length;
          const attempts = played.reduce((s,id) => s + (progress[id]?.attempts||0), 0);
          // Basitleştirilmiş MacDonald-Wilkins düzey tahmini
          let mwLevel, mwName, mwDesc;
          if(avgStars < 0.5) { mwLevel=1; mwName='Şekil Betimleme'; mwDesc='Öğrenci nesneleri sayısal değil, şekilsel olarak algılıyor. Daha fazla 1-3 arası sanbil pratiği önerilir.'; }
          else if(avgStars < 1.2) { mwLevel=2; mwName='Bölümleyici'; mwDesc='Alt grupları fark ediyor ama bütüne ulaşamıyor. Gruplama etkinlikleri önerilir.'; }
          else if(avgStars < 1.8) { mwLevel=3; mwName='Algısal Sayıcı'; mwDesc='Küçük kümeleri tanıyor. Kavramsal sanbile geçiş için farklı düzenler kullanılmalı.'; }
          else if(avgStars < 2.3) { mwLevel=4; mwName='Ritmik Sayıcı'; mwDesc='Grupları sıralı algılıyor. İkili ve üçlü grupları birleştirme pratiği yapılmalı.'; }
          else if(avgStars < 2.7) { mwLevel=5; mwName='Kavramsal Sanbilci'; mwDesc='Parça-bütün ilişkisini kavrıyor. Aritmetik entegrasyon için hazır.'; }
          else { mwLevel=6; mwName='Esnek Kavramsal'; mwDesc='Farklı gruplama stratejilerini esnek kullanıyor. İleri aritmetik için güçlü temel.'; }
          const mwPct = Math.round((mwLevel/6)*100);
          return (
          <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
            <h3 className="font-bold text-gray-700 mb-2 text-sm">🔬 Sanbil Gelişim Düzeyi (MacDonald-Wilkins)</h3>
            <div className="flex items-center gap-3 mb-2">
              <div className="w-14 h-14 bg-rose-100 rounded-full flex items-center justify-center">
                <span className="text-xl font-bold text-rose-600">{mwLevel}/6</span>
              </div>
              <div className="flex-1">
                <div className="font-bold text-gray-800">{mwName}</div>
                <div className="text-xs text-gray-500">{mwDesc}</div>
              </div>
            </div>
            <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full bg-gradient-to-r from-rose-400 to-pink-500" style={{width:`${mwPct}%`}}/>
            </div>
            <div className="text-[10px] text-gray-400 mt-1 text-right">{played.length} oyun, {attempts} deneme verisiyle hesaplandı</div>
          </div>);
        })()}

        {/* 📐 Van Hiele Geometrik Düşünce Düzeyi */}
        {(() => {
          const geoGames = ['D1','D2','D3','D4','D5'];
          const played = geoGames.filter(id => progress[id]);
          if(played.length < 1) return null;
          // Basitleştirilmiş Van Hiele düzey tahmini
          const d1Stars = progress['D1']?.stars || 0;
          const d2Stars = progress['D2']?.stars || 0;
          const d3Stars = progress['D3']?.stars || 0;
          const d4Stars = progress['D4']?.stars || 0;
          const d5Stars = progress['D5']?.stars || 0;
          let vhLevel, vhName, vhDesc;
          if(d1Stars < 1) { vhLevel='Ön-Tanıma'; vhName='Ön-Tanıma Düzeyi'; vhDesc='Eğrisel ve doğrusal formları ayırt etme aşamasında. Temel şekil tanıma pratiğine devam edilmeli.'; }
          else if(d2Stars < 1) { vhLevel='Düzey 0'; vhName='Görselleştirme'; vhDesc='Şekilleri bütünsel görünümleriyle tanıyor. Özellik analizi etkinliklerine geçiş önerilir.'; }
          else if(d3Stars < 1) { vhLevel='Düzey 1'; vhName='Analiz'; vhDesc='Şekillerin özelliklerini (kenar, açı) tanımlayabiliyor. İlişki kurma etkinliklerine hazır.'; }
          else { vhLevel='Düzey 2'; vhName='İlişkilendirme'; vhDesc='Şekiller arası ilişkileri (kare↔dikdörtgen) kavrıyor. Formal çıkarıma hazırlanıyor.'; }
          const vhColors = {'Ön-Tanıma':'#EF4444','Düzey 0':'#F59E0B','Düzey 1':'#3B82F6','Düzey 2':'#10B981'};
          return (
          <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
            <h3 className="font-bold text-gray-700 mb-2 text-sm">📐 Geometrik Düşünce Düzeyi (Van Hiele)</h3>
            <div className="flex items-center gap-3 mb-2">
              <div className="px-3 py-2 rounded-lg text-white font-bold text-sm" style={{backgroundColor:vhColors[vhLevel]||'#6B7280'}}>{vhLevel}</div>
              <div className="flex-1">
                <div className="font-bold text-gray-800">{vhName}</div>
                <div className="text-xs text-gray-500">{vhDesc}</div>
              </div>
            </div>
            <div className="flex gap-1 mt-1">
              {['Ön-Tanıma','Düzey 0','Düzey 1','Düzey 2'].map((d,i) => (
                <div key={i} className={`flex-1 h-2 rounded-full ${d===vhLevel?'opacity-100':'opacity-20'}`} style={{backgroundColor:vhColors[d]}}/>
              ))}
            </div>
            <div className="flex justify-between text-[9px] text-gray-400 mt-0.5">
              <span>Ön-Tanıma</span><span>Düzey 2</span>
            </div>
          </div>);
        })()}



        {/* 🤖 Kişiselleştirilmiş Strateji Koçu */}
        {(() => {
          const played = Object.entries(progress).filter(([,d]) => d.attempts >= 1);
          if(played.length < 3) return null;
          
          // Hata paternlerini analiz et ve kişiselleştirilmiş öneriler üret
          const insights = [];
          
          // 1. Sanbil analizi
          const sanbilGames = ['A1','A2','A3','A5','A6'];
          const sanbilPlayed = sanbilGames.filter(id => progress[id]);
          if(sanbilPlayed.length >= 2) {
            const avgS = sanbilPlayed.reduce((s,id) => s + (progress[id]?.stars||0), 0) / sanbilPlayed.length;
            if(avgS < 1) insights.push({emoji:'👁️', title:'Sanbil Güçlendirme', text:'Sanbil becerin henüz gelişiyor. Küçük grupları (2-3) hızlı tanımaya odaklan. Günde 5 dk Nokta Avcısı oyna.', priority:5});
            else if(avgS < 2) insights.push({emoji:'💡', title:'Sanbil → Gruplama Geçişi', text:'Küçük grupları tanıyorsun! Şimdi büyük kümeleri alt gruplara ayırmayı dene. Gruplama Ustası oyununa odaklan.', priority:3});
          }
          
          // 2. Sembolik işleme analizi
          const sembolik = ['C1','C2','C3','C4','C5'];
          const semPlayed = sembolik.filter(id => progress[id]);
          if(semPlayed.length >= 1) {
            const kodC = progress['C5'];
            const sembolE = progress['C1'];
            if(kodC && sembolE && (kodC.stars||0) > (sembolE.stars||0)) {
              insights.push({emoji:'🔄', title:'Kodlar Arası Güç Farkı', text:'Kodlar arası çeviride iyisin ama sembol tanımada zorluk var. Sayı-Sembol Eşleştirme oyununu tekrarla.', priority:4});
            }
            const basam = progress['C4'];
            if(basam && (basam.stars||0) <= 1 && basam.attempts >= 2) {
              insights.push({emoji:'🏛️', title:'Basamak Değeri Desteği', text:'Basamak değeri kavramında güçlük görülüyor. Onluk çubukları ve birlik küpleri ile somut pratik önerilir.', priority:5});
            }
          }
          
          // 3. Tahmin stratejisi analizi
          const tahmin = ['B1','B2','B4','B5'];
          const tahPlayed = tahmin.filter(id => progress[id]);
          if(tahPlayed.length >= 2) {
            const avgT = tahPlayed.reduce((s,id) => s + (progress[id]?.stars||0), 0) / tahPlayed.length;
            if(avgT < 1.5) insights.push({emoji:'🎯', title:'Tahmin Stratejisi Koçluğu', text:'Tahmin becerini güçlendirmek için: 1) Referans noktası kullan, 2) Grupla düşün, 3) Yuvarla. Her tahminde "Açıkla" adımını kullan!', priority:3});
          }
          
          // 4. Geometri-uzamsal analizi
          const geo = ['D1','D2','D3','D5','D6'];
          const geoPlayed = geo.filter(id => progress[id]);
          if(geoPlayed.length >= 1) {
            const dondurme = progress['D5'];
            const simetri = progress['D6'];
            if(dondurme && (dondurme.stars||0) <= 1 && dondurme.attempts >= 2) {
              insights.push({emoji:'🔄', title:'Zihinsel Döndürme Desteği', text:'Şekli zihninde döndürmede zorluk var. Gerçek nesneleri elinle döndürme pratiği yap, sonra ekranda dene.', priority:4});
            }
            if(simetri && (simetri.stars||0) <= 1) {
              insights.push({emoji:'🪞', title:'Simetri Keşfi', text:'Kağıdı ikiye katlayarak simetrik desenleri kesmek, simetri algısını güçlendirir. Sonra Simetri Aynası oyununa dön.', priority:3});
            }
          }
          
          // 5. Aritmetik analizi
          const aritmetik = ['E1','E2','E3','E4','E5'];
          const aritPlayed = aritmetik.filter(id => progress[id]);
          if(aritPlayed.length >= 1) {
            const toplama = progress['E3'];
            if(toplama && (toplama.stars||0) <= 1 && toplama.attempts >= 3) {
              insights.push({emoji:'➕', title:'Toplama Stratejileri', text:'Toplama zorlanıyor. Parmaklardan başla (Parmak Köprüsü), sonra sayı doğrusuna geç (Sayı Yürüyüşü), en son zihinsel stratejilere geç.', priority:5});
            }
          }
          
          // 6. Genel motivasyon analizi
          const totalAttempts = played.reduce((s,[,d]) => s + (d.attempts||0), 0);
          const totalStars = played.reduce((s,[,d]) => s + (d.stars||0), 0);
          if(totalAttempts > 20 && totalStars/played.length < 1) {
            insights.push({emoji:'💪', title:'Motivasyon Desteği', text:'Çok çalışıyorsun, bu harika! Rahat Mod (🐢) ile başla ve seviye 1\'den ilerle. Her küçük ilerleme değerlidir.', priority:2});
          }
          
          // En önemli 3 öneriyi göster
          const top = insights.sort((a,b) => b.priority - a.priority).slice(0, 3);
          if(top.length === 0) {
            if(played.length >= 5) return (
              <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
                <h3 className="font-bold text-gray-700 mb-2 text-sm">🤖 Strateji Koçu</h3>
                <div className="bg-green-50 p-3 rounded-lg text-sm text-green-700">✨ Tüm alanlarda tutarlı ilerleme gösteriyorsun. Mevcut çalışma düzenini sürdür ve yeni seviyelerle kendini zorla!</div>
              </div>
            );
            return null;
          }
          
          return (
            <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
              <h3 className="font-bold text-gray-700 mb-2 text-sm">🤖 Kişiselleştirilmiş Strateji Koçu</h3>
              <div className="space-y-2">
                {top.map((ins, i) => (
                  <div key={i} className="bg-indigo-50 rounded-lg p-2.5">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-lg">{ins.emoji}</span>
                      <span className="font-bold text-xs text-indigo-800">{ins.title}</span>
                    </div>
                    <div className="text-xs text-gray-600 leading-relaxed">{ins.text}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* 🔎 Hata Paterni Analizi */}
        {(() => {
          const played = Object.entries(progress).filter(([,d]) => d.attempts >= 2);
          if(played.length < 3) return null;
          // Hata tipi tahmini (basitleştirilmiş)
          const patterns = [];
          const highAttemptLowStar = played.filter(([,d]) => d.attempts >= 4 && d.stars <= 1);
          if(highAttemptLowStar.length >= 2) patterns.push({type:'Kalıcı Zorluk', emoji:'🔴', desc:`${highAttemptLowStar.length} oyunda çok deneme yapılmasına rağmen düşük puan. Kavramsal anlama güçlüğü olabilir.`, games:highAttemptLowStar.slice(0,3).map(([id])=>GAMES[id]?.name).filter(Boolean)});
          const lowAttemptLowStar = played.filter(([,d]) => d.attempts <= 2 && d.stars <= 1);
          if(lowAttemptLowStar.length >= 3) patterns.push({type:'Erken Bırakma', emoji:'🟡', desc:'Birçok oyun yalnızca 1-2 kez deneniyor. Motivasyon desteği ve tekrar teşviki önerilir.', games:lowAttemptLowStar.slice(0,3).map(([id])=>GAMES[id]?.name).filter(Boolean)});
          const catScores = CATEGORIES.map(cat => {
            const cg = Object.entries(GAMES).filter(([,g])=>g.cat===cat.id);
            const avg = cg.reduce((s,[id])=>s+(progress[id]?.stars||0),0)/(cg.length||1);
            return {name:cat.name,emoji:cat.emoji,avg};
          });
          const weakCat = catScores.filter(c=>c.avg<1).sort((a,b)=>a.avg-b.avg);
          const strongCat = catScores.filter(c=>c.avg>=2).sort((a,b)=>b.avg-a.avg);
          if(weakCat.length>0 && strongCat.length>0) patterns.push({type:'Dengesiz Profil', emoji:'🟠', desc:`${weakCat[0].emoji} ${weakCat[0].name} alanı zayıf, ${strongCat[0].emoji} ${strongCat[0].name} güçlü. Zayıf alana odaklanılması önerilir.`});
          if(patterns.length === 0) {
            const allGood = catScores.every(c=>c.avg>=1.5);
            if(allGood) patterns.push({type:'Dengeli Gelişim', emoji:'🟢', desc:'Tüm kategorilerde tutarlı ilerleme gösteriliyor. Mevcut çalışma düzeni sürdürülmeli.'});
          }
          if(patterns.length === 0) return null;
          return (
          <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
            <h3 className="font-bold text-gray-700 mb-2 text-sm">🔎 Performans Paterni Analizi</h3>
            <div className="space-y-2">{patterns.map((p,i) => (
              <div key={i} className="bg-gray-50 rounded-lg p-2">
                <div className="flex items-center gap-2 mb-1"><span className="text-lg">{p.emoji}</span><span className="font-bold text-sm text-gray-700">{p.type}</span></div>
                <div className="text-xs text-gray-600">{p.desc}</div>
                {p.games && <div className="text-[10px] text-gray-400 mt-1">İlgili oyunlar: {p.games.join(', ')}</div>}
              </div>
            ))}</div>
          </div>);
        })()}



        {/* 🧬 Beceri Haritası (Bilgi Grafiği) */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">🧬 Beceri Haritası</h3>
          <div className="grid grid-cols-2 gap-1.5">
            {Object.entries(SKILL_GRAPH).map(([id, skill]) => {
              const m = calcMastery(id, progress);
              const ready = prereqsMet(id, progress);
              const pct = Math.round(m * 100);
              return (
                <div key={id} className={`p-1.5 rounded-lg border text-[10px] ${!ready && skill.prereqs.length>0 ? 'bg-gray-50 border-gray-200 opacity-50' : 'bg-white border-gray-200'}`}>
                  <div className="flex justify-between items-center mb-0.5">
                    <span className="font-bold text-gray-700">{skill.name}</span>
                    <span className={`font-bold ${pct>=70?'text-green-600':pct>=30?'text-amber-600':pct>0?'text-red-500':'text-gray-400'}`}>{pct}%</span>
                  </div>
                  <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full ${pct>=70?'bg-green-400':pct>=30?'bg-amber-400':'bg-red-300'}`} style={{width:`${pct}%`}}/>
                  </div>
                  {!ready && skill.prereqs.length>0 && <div className="text-[8px] text-gray-400 mt-0.5">🔒 Önkoşul: {skill.prereqs.map(p=>SKILL_GRAPH[p]?.name).join(', ')}</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* 📐 CRA (Somut→Temsili→Soyut) İlerleme Haritası */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">📐 CRA İlerleme Haritası</h3>
          <div className="text-[10px] text-gray-400 mb-2">Her kavramın Somut (C), Temsili (R) ve Soyut (A) düzeyindeki yetkinliği</div>
          {(() => {
            const craMap = {
              'Sayı Hissi': {C:['A3','A4'],R:['A1','A5'],A:['C1','C2']},
              'Toplama/Çıkarma': {C:['E2'],R:['E5','E3'],A:['B5']},
              'Geometri': {C:['D1','D6'],R:['D2','D5'],A:['D3','D4']},
              'Tahmin': {C:['B1'],R:['B3','B4'],A:['B2','B5']},
            };
            return Object.entries(craMap).map(([concept,levels]) => {
              const getLevel = (ids) => {
                const played = ids.filter(id=>progress[id]);
                if(played.length===0) return 0;
                return played.reduce((s,id)=>s+(progress[id]?.stars||0),0)/(played.length*3)*100;
              };
              const c=getLevel(levels.C),r=getLevel(levels.R),a=getLevel(levels.A);
              const currentLevel = a >= 50 ? 'Soyut' : r >= 50 ? 'Temsili' : c >= 50 ? 'Somut' : 'Başlangıç';
              const levelColor = {Başlangıç:'text-gray-400',Somut:'text-orange-600',Temsili:'text-blue-600',Soyut:'text-green-600'};
              return (
                <div key={concept} className="mb-2">
                  <div className="flex justify-between items-center text-xs mb-0.5">
                    <span className="font-medium text-gray-700">{concept}</span>
                    <span className={`font-bold text-[10px] ${levelColor[currentLevel]}`}>{currentLevel}</span>
                  </div>
                  <div className="flex gap-0.5 h-3">
                    <div className="flex-1 bg-orange-100 rounded-l-full overflow-hidden"><div className="h-full bg-orange-400 rounded-l-full" style={{width:`${c}%`}}/></div>
                    <div className="flex-1 bg-blue-100 overflow-hidden"><div className="h-full bg-blue-400" style={{width:`${r}%`}}/></div>
                    <div className="flex-1 bg-green-100 rounded-r-full overflow-hidden"><div className="h-full bg-green-400 rounded-r-full" style={{width:`${a}%`}}/></div>
                  </div>
                </div>
              );
            });
          })()}
          <div className="flex gap-3 mt-1 text-[9px] text-gray-400">
            <span className="flex items-center gap-1"><span className="w-2 h-2 bg-orange-400 rounded-full"/>Somut (C)</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 bg-blue-400 rounded-full"/>Temsili (R)</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 bg-green-400 rounded-full"/>Soyut (A)</span>
          </div>
        </div>

        {/* 📊 Gelişim Grafiği - Kategori Karşılaştırması */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">📊 Kategori Performans Grafiği</h3>
          <svg viewBox="0 0 300 120" className="w-full">
            {catStats.map((cat, i) => {
              const barW = 40;
              const gap = (300 - catStats.length * barW) / (catStats.length + 1);
              const x = gap + i * (barW + gap);
              const maxH = 80;
              const pct = cat.maxStars > 0 ? cat.stars / cat.maxStars : 0;
              const h = Math.max(2, pct * maxH);
              const colors = {A:'#F43F5E',B:'#F59E0B',C:'#3B82F6',D:'#10B981',E:'#A855F7'};
              return (<g key={cat.id}>
                <rect x={x} y={95-h} width={barW} height={h} rx="4" fill={colors[cat.id]||'#6B7280'} opacity="0.85"/>
                <text x={x+barW/2} y={90-h} textAnchor="middle" fontSize="9" fill="#374151" fontWeight="bold">{cat.stars}/{cat.maxStars}</text>
                <text x={x+barW/2} y={110} textAnchor="middle" fontSize="10">{cat.emoji}</text>
              </g>);
            })}
            <line x1="10" y1="95" x2="290" y2="95" stroke="#E5E7EB" strokeWidth="1"/>
          </svg>
          <div className="text-center text-[10px] text-gray-400 mt-1">Yıldız / Maksimum Yıldız</div>
        </div>

        {/* Kazanılan Rozetler */}
        {(() => { const earned = checkBadges(progress); return earned.length > 0 ? (
          <div className="bg-gradient-to-r from-yellow-50 to-amber-50 rounded-xl border border-amber-200 p-3 mb-3">
            <h3 className="font-bold text-amber-700 mb-2 text-sm">🏆 Kazanılan Rozetler ({earned.length}/{BADGES.length})</h3>
            <div className="space-y-1.5">{earned.map(b => (
              <div key={b.id} className="flex items-center gap-2 bg-white rounded-lg p-2 shadow-sm">
                <span className="text-xl">{b.emoji}</span>
                <div><div className="text-xs font-bold text-gray-700">{b.name}</div><div className="text-[10px] text-gray-500">{b.desc}</div></div>
              </div>
            ))}</div>
          </div>
        ) : null; })()}

                {/* Kategori Bazlı İlerleme */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">📈 Kategori İlerlemesi</h3>
          <div className="space-y-2">
            {catStats.map(cat => (
              <div key={cat.id}>
                <div className="flex items-center justify-between text-xs mb-0.5">
                  <span className="font-medium text-gray-700">{cat.emoji} {cat.name}</span>
                  <span className="text-gray-500">{cat.played}/{cat.total}</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full bg-gradient-to-r ${cat.color.gradient} transition-all duration-500`}
                      style={{ width: `${cat.total > 0 ? (cat.played / cat.total) * 100 : 0}%` }} />
                  </div>
                  <span className="text-[10px] text-yellow-600 font-medium w-10 text-right">{'⭐'.repeat(Math.min(3, Math.round(cat.stars / Math.max(1, cat.played))))}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Oyun Bazlı Detay */}
        <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
          <h3 className="font-bold text-gray-700 mb-2 text-sm">🎮 Oyun Detayları</h3>
          <div className="space-y-1">
            {Object.entries(GAMES).map(([id, g]) => {
              const p = progress[id];
              return (
                <div key={id} className={`flex items-center gap-2 p-1.5 rounded-lg ${p ? 'bg-green-50' : 'bg-gray-50'}`}>
                  <span className="text-base">{g.emoji}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-medium text-gray-700 truncate">{g.name}</div>
                    {p ? (
                      <div className="text-[10px] text-gray-500">En iyi: {p?.bestScore} • Sv.{p?.maxLevel || 1} • {p?.attempts || 1}x</div>
                    ) : (
                      <div className="text-[10px] text-gray-400">—</div>
                    )}
                  </div>
                  <div className="flex gap-0.5">{[1,2,3].map(i => <span key={i} className="text-xs">{p && i <= (p?.stars || 0) ? '⭐' : '☆'}</span>)}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Son Oynananlar */}
        {recentPlays.length > 0 && (
          <div className="bg-white rounded-xl shadow-lg p-3 mb-3">
            <h3 className="font-bold text-gray-700 mb-2 text-sm">🕐 Son Oynananlar</h3>
            <div className="space-y-1">
              {recentPlays.map(([id, d]) => {
                const g = GAMES[id];
                const date = new Date(d.lastPlayed);
                const dateStr = `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                return (
                  <div key={id} className="flex items-center gap-2 text-xs">
                    <span>{g?.emoji}</span>
                    <span className="flex-1 text-gray-700">{g?.name}</span>
                    <span className="text-gray-400">{dateStr}</span>
                    <span className="font-bold text-amber-600">{d.lastScore}p</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Krediler */}
        <div className="text-center py-3">
          <p className="text-[10px] text-gray-400">Prof. Dr. Yılmaz Mutlu • Prof. Dr. Sinan Olkun</p>
        </div>
        </div>
      </div>
    </div>
  );
};


// ==================== YÖNETİCİ PANELİ (ÇOK KULLANICILI İSTATİSTİK) ====================
const AdminPanel = ({ onBack }) => {
  const [authenticated, setAuthenticated] = useState(false);
  const [pw, setPw] = useState('');
  const [pwError, setPwError] = useState(false);
  const ADMIN_PW = 'matbil2025';
  const [allUsers, setAllUsers] = useState([]);
  const [allData, setAllData] = useState([]);

  useEffect(() => {
    // Tüm localStorage'daki kullanıcıları topla
    try {
      const usersRaw = localStorage.getItem('matbil_users');
      const users = usersRaw ? JSON.parse(usersRaw) : [];
      setAllUsers(users);
      
      const data = users.map(u => {
        const prog = JSON.parse(localStorage.getItem(`matbil_progress_${u.id}`) || '{}');
        return { user: u, progress: prog };
      });
      setAllData(data);
    } catch(e) { console.error(e); }
  }, []);

  // CSV oluştur
  const exportCSV = () => {
    const headers = ['Öğrenci Adı','Yaş','Şehir','Oyun ID','Oyun Adı','Kategori','En İyi Puan','Son Puan','Maks Seviye','Yıldız','Deneme Sayısı','Son Oynama'];
    const rows = [];
    allData.forEach(({user, progress}) => {
      Object.entries(GAMES).forEach(([gid, g]) => {
        const p = progress[gid];
        rows.push([
          user.name, user.age || '', user.city || '',
          gid, g.name, CATEGORIES.find(c=>c.id===g.cat)?.name || '',
          p?.bestScore || 0, p?.lastScore || 0, p?.maxLevel || 0,
          p?.stars || 0, p?.attempts || 0, p?.lastPlayed || ''
        ].join(','));
      });
    });
    const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `matbil_istatistik_${new Date().toISOString().split('T')[0]}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  // JSON oluştur
  const exportJSON = () => {
    const data = {
      exportDate: new Date().toISOString(),
      appVersion: 'v14.0',
      totalStudents: allUsers.length,
      students: allData.map(({user, progress}) => ({
        name: user.name, age: user.age, city: user.city, id: user.id,
        gamesPlayed: Object.keys(progress).length,
        totalStars: Object.values(progress).reduce((s,g)=>s+(g.stars||0),0),
        totalAttempts: Object.values(progress).reduce((s,g)=>s+(g.attempts||0),0),
        categories: CATEGORIES.map(cat => {
          const cg = Object.entries(GAMES).filter(([,g])=>g.cat===cat.id);
          const cp = cg.filter(([id])=>progress[id]);
          return {
            id: cat.id, name: cat.name,
            played: cp.length, total: cg.length,
            stars: cp.reduce((s,[id])=>s+(progress[id]?.stars||0),0),
            avgScore: cp.length > 0 ? Math.round(cp.reduce((s,[id])=>s+(progress[id]?.bestScore||0),0)/cp.length) : 0
          };
        }),
        games: Object.entries(progress).map(([id, p]) => ({
          gameId: id, gameName: GAMES[id]?.name, category: GAMES[id]?.cat,
          bestScore: p?.bestScore, lastScore: p?.lastScore, maxLevel: p?.maxLevel,
          stars: p?.stars, attempts: p?.attempts, lastPlayed: p?.lastPlayed
        }))
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `matbil_data_${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  // Toplu istatistikler
  const totalPlayed = allData.reduce((s,d) => s + Object.keys(d.progress).length, 0);
  const totalAttempts = allData.reduce((s,d) => s + Object.values(d.progress).reduce((a,g)=>a+(g.attempts||0),0), 0);
  const totalStarsAll = allData.reduce((s,d) => s + Object.values(d.progress).reduce((a,g)=>a+(g.stars||0),0), 0);

  // Kategori bazlı ortalamalar (tüm kullanıcılar)
  const catAggregates = CATEGORIES.map(cat => {
    const catGames = Object.entries(GAMES).filter(([,g])=>g.cat===cat.id);
    let totalScore = 0, totalCount = 0, totalStars = 0;
    allData.forEach(({progress}) => {
      catGames.forEach(([id]) => {
        if(progress[id]) {
          totalScore += progress[id].bestScore || 0;
          totalStars += progress[id].stars || 0;
          totalCount++;
        }
      });
    });
    return { ...cat, avgScore: totalCount > 0 ? Math.round(totalScore/totalCount) : 0, avgStars: totalCount > 0 ? (totalStars/totalCount).toFixed(1) : 0, playCount: totalCount };
  });

  // En çok oynanan oyunlar
  const gamePopularity = Object.entries(GAMES).map(([id, g]) => {
    let totalAttempts = 0, totalScore = 0, playerCount = 0;
    allData.forEach(({progress}) => {
      if(progress[id]) { totalAttempts += progress[id].attempts||0; totalScore += progress[id].bestScore||0; playerCount++; }
    });
    return { id, name: g.name, emoji: g.emoji, totalAttempts, avgScore: playerCount > 0 ? Math.round(totalScore/playerCount) : 0, playerCount };
  }).sort((a,b) => b.totalAttempts - a.totalAttempts);

  // Şifre doğrulama ekranı
  if (!authenticated) return (
    <div className="h-screen bg-gradient-to-b from-slate-50 to-blue-50 flex flex-col items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-xl p-5 max-w-sm w-full text-center">
        <div className="text-5xl mb-3">🔐</div>
        <h2 className="text-xl font-bold text-gray-800 mb-2">Yönetici Girişi</h2>
        <p className="text-sm text-gray-500 mb-6">Bu alan sadece yetkili kişiler içindir.</p>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwError(false);}} placeholder="Şifre giriniz..."
          className={`w-full p-3 border-2 rounded-xl text-center text-lg font-bold mb-3 outline-none ${pwError ? 'border-red-400 bg-red-50' : 'border-gray-200 focus:border-indigo-400'}`}
          onKeyDown={e=>{if(e.key==='Enter'){if(pw===ADMIN_PW)setAuthenticated(true);else setPwError(true);}}}/>
        {pwError && <p className="text-red-500 text-sm mb-3 font-medium">Hatalı şifre. Tekrar deneyin.</p>}
        <div className="flex gap-3">
          <button onClick={onBack} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200">← Geri</button>
          <button onClick={()=>{if(pw===ADMIN_PW)setAuthenticated(true);else setPwError(true);}} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">Giriş</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="h-screen bg-gradient-to-b from-slate-50 to-blue-50 flex flex-col overflow-hidden">
      {/* Header (SABİT) */}

// ==================== STANDART SAYISAL BİLİŞ TARAMASI (Butterworth tarzı) ====================
const TaramaTestiButton = ({ user, onComplete }) => {
  const [active, setActive] = useState(false);
  const [phase, setPhase] = useState(0); // 0:intro, 1:dotEnum, 2:numComp, 3:arithmetic, 4:results
  const [qi, setQi] = useState(0);
  const [results, setResults] = useState({dotEnum:[],numComp:[],arith:[]});
  const [startTime, setStartTime] = useState(0);
  const [q, setQ] = useState(null);

  // Dot Enumeration (6 soru): kaç nokta? 
  const genDotQ = () => {
    const count = Math.floor(Math.random()*7)+2; // 2-8
    const dots = Array.from({length:count},()=>({x:15+Math.random()*70,y:15+Math.random()*70}));
    const opts = [count]; while(opts.length<4){const o=Math.floor(Math.random()*8)+1;if(!opts.includes(o))opts.push(o);}
    return {type:'dot',count,dots,opts:opts.sort(()=>Math.random()-0.5)};
  };
  // Number Comparison (6 soru): hangisi büyük?
  const genNumQ = () => {
    const a=Math.floor(Math.random()*90)+10, diff=Math.floor(Math.random()*20)+1;
    const b=Math.random()>0.5?a+diff:a-diff;
    const answer=Math.max(a,b);
    return {type:'num',a,b:Math.max(1,b),answer,opts:[a,Math.max(1,b)]};
  };
  // Arithmetic (6 soru): basit toplama/çıkarma
  const genArithQ = () => {
    const a=Math.floor(Math.random()*15)+3, b=Math.floor(Math.random()*8)+1;
    const op=Math.random()>0.4?'+':'-';
    const answer=op==='+'?a+b:a-b;
    const opts=[answer]; while(opts.length<4){const o=answer+Math.floor(Math.random()*7)-3;if(o>0&&!opts.includes(o))opts.push(o);}
    return {type:'arith',a,b,op,answer,opts:opts.sort(()=>Math.random()-0.5)};
  };

  const startPhase = (ph) => {
    setPhase(ph); setQi(0);
    if(ph===1) setQ(genDotQ());
    else if(ph===2) setQ(genNumQ());
    else if(ph===3) setQ(genArithQ());
    setStartTime(Date.now());
  };

  const handleAnswer = (ans) => {
    const rt = Date.now() - startTime;
    const correct = q.type==='num' ? ans===q.answer : ans===q[q.type==='dot'?'count':'answer'];
    const key = q.type==='dot'?'dotEnum':q.type==='num'?'numComp':'arith';
    setResults(prev=>({...prev,[key]:[...prev[key],{correct,rt}]}));
    
    if(qi < 5) {
      setQi(qi+1);
      if(q.type==='dot') setQ(genDotQ());
      else if(q.type==='num') setQ(genNumQ());
      else setQ(genArithQ());
      setStartTime(Date.now());
    } else {
      if(phase < 3) startPhase(phase + 1);
      else setPhase(4);
    }
  };

  const saveResults = () => {
    const score = {
      dotEnum: {acc: Math.round(results.dotEnum.filter(r=>r.correct).length/6*100), avgRT: Math.round(results.dotEnum.reduce((s,r)=>s+r.rt,0)/6)},
      numComp: {acc: Math.round(results.numComp.filter(r=>r.correct).length/6*100), avgRT: Math.round(results.numComp.reduce((s,r)=>s+r.rt,0)/6)},
      arith: {acc: Math.round(results.arith.filter(r=>r.correct).length/6*100), avgRT: Math.round(results.arith.reduce((s,r)=>s+r.rt,0)/6)},
      date: new Date().toISOString(),
    };
    try { 
      const key = `matbil_screening_${user?.name}`;
      const prev = JSON.parse(localStorage.getItem(key) || '[]');
      prev.push(score);
      localStorage.setItem(key, JSON.stringify(prev));
    } catch {}
    setActive(false);
    if(onComplete) onComplete(score);
  };

  if(!active) return (
    <button onClick={()=>{setActive(true);setPhase(0);setResults({dotEnum:[],numComp:[],arith:[]});}} 
      className="w-full px-4 py-2.5 bg-gradient-to-r from-teal-500 to-cyan-500 text-white rounded-xl font-bold text-sm shadow-lg hover:shadow-xl transition-all">
      🔬 Sayısal Biliş Tarama Testi
    </button>
  );

  if(phase === 0) return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl p-5 max-w-sm w-full text-center shadow-2xl">
        <div className="text-4xl mb-3">🔬</div>
        <h3 className="text-lg font-bold text-gray-800 mb-2">Sayısal Biliş Tarama Testi</h3>
        <p className="text-sm text-gray-600 mb-4">3 bölüm × 6 soru = 18 soru. Nokta sayma, sayı karşılaştırma ve basit aritmetik test edilecek. Hem doğruluk hem hız ölçülür.</p>
        <div className="flex gap-3">
          <button onClick={()=>setActive(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">İptal</button>
          <button onClick={()=>startPhase(1)} className="flex-1 py-3 bg-teal-500 text-white rounded-xl font-bold">Başla</button>
        </div>
      </div>
    </div>
  );

  if(phase === 4) return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl">
        <h3 className="text-lg font-bold text-gray-800 mb-3 text-center">📊 Tarama Sonuçları</h3>
        <div className="space-y-2 mb-4">
          {[{key:'dotEnum',name:'Nokta Sayma',emoji:'🔵'},{key:'numComp',name:'Sayı Karşılaştırma',emoji:'⚖️'},{key:'arith',name:'Aritmetik',emoji:'➕'}].map(s=>{
            const d = results[s.key];
            const acc = Math.round(d.filter(r=>r.correct).length/6*100);
            const avgRT = Math.round(d.reduce((sum,r)=>sum+r.rt,0)/6);
            return (
              <div key={s.key} className="flex items-center gap-3 bg-gray-50 p-2 rounded-lg">
                <span className="text-xl">{s.emoji}</span>
                <div className="flex-1"><div className="text-xs font-bold text-gray-700">{s.name}</div>
                  <div className="flex gap-3 text-[10px] text-gray-500"><span>Doğruluk: {acc}%</span><span>Ort. Süre: {avgRT}ms</span></div>
                </div>
                <div className={`px-2 py-1 rounded-full text-xs font-bold ${acc>=80?'bg-green-100 text-green-700':acc>=50?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>{acc>=80?'İyi':acc>=50?'Orta':'Risk'}</div>
              </div>
            );
          })}
        </div>
        <button onClick={saveResults} className="w-full py-3 bg-teal-500 text-white rounded-xl font-bold">✓ Kaydet ve Kapat</button>
      </div>
    </div>
  );

  // Active test phases (1-3)
  const phaseNames = {1:'Nokta Sayma (🔵)',2:'Sayı Karşılaştırma (⚖️)',3:'Aritmetik (➕)'};
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl text-center">
        <div className="text-xs text-gray-400 mb-1">Bölüm {phase}/3: {phaseNames[phase]} — Soru {qi+1}/6</div>
        <div className="h-1 bg-gray-100 rounded-full mb-3"><div className="h-full bg-teal-400 rounded-full transition-all" style={{width:`${((phase-1)*6+qi+1)/18*100}%`}}/></div>
        
        {q?.type==='dot' && (
          <div className="mb-3">
            <div className="w-40 h-40 bg-gray-50 rounded-xl mx-auto mb-2 relative border-2 border-gray-200">
              {q.dots.map((d,i)=><div key={i} className="absolute w-4 h-4 bg-indigo-500 rounded-full" style={{left:`${d.x}%`,top:`${d.y}%`,transform:'translate(-50%,-50%)'}}/>)}
            </div>
            <div className="text-sm font-bold text-gray-700 mb-2">Kaç nokta var?</div>
            <div className="grid grid-cols-4 gap-2">{q.opts.map((o,i)=><button key={i} onClick={()=>handleAnswer(o)} className="py-3 bg-indigo-50 text-indigo-700 rounded-lg font-bold text-lg hover:bg-indigo-100">{o}</button>)}</div>
          </div>
        )}
        {q?.type==='num' && (
          <div className="mb-3">
            <div className="text-sm font-bold text-gray-700 mb-3">Hangisi daha büyük?</div>
            <div className="flex gap-4 justify-center">{q.opts.map((o,i)=><button key={i} onClick={()=>handleAnswer(o)} className="w-24 py-5 bg-emerald-50 text-emerald-700 rounded-xl font-bold text-3xl hover:bg-emerald-100 border-2 border-emerald-200">{o}</button>)}</div>
          </div>
        )}
        {q?.type==='arith' && (
          <div className="mb-3">
            <div className="text-2xl font-bold text-purple-700 mb-3">{q.a} {q.op} {q.b} = ?</div>
            <div className="grid grid-cols-2 gap-2">{q.opts.map((o,i)=><button key={i} onClick={()=>handleAnswer(o)} className="py-4 bg-purple-50 text-purple-700 rounded-lg font-bold text-xl hover:bg-purple-100">{o}</button>)}</div>
          </div>
        )}
      </div>
    </div>
  );
};

  const [expandedCat, setExpandedCat] = useState(null);
  const [buyukYazi, setBuyukYazi] = useState(() => { try { return localStorage.getItem('matbil_buyuk_yazi') === 'true'; } catch { return false; } });
  const toggleYazi = () => { const v = !buyukYazi; setBuyukYazi(v); try { localStorage.setItem('matbil_buyuk_yazi', v ? 'true' : 'false'); } catch {} };
  const [sesAcik, setSesAcik] = useState(() => { try { return localStorage.getItem('matbil_ses') !== 'false'; } catch { return true; } });
  const toggleSes = () => { const v = !sesAcik; setSesAcik(v); try { localStorage.setItem('matbil_ses', v ? 'true' : 'false'); } catch {} };
  // Streak (ardışık gün) sistemi
  const [streak, setStreak] = useState(() => {
    try {
      const data = JSON.parse(localStorage.getItem('matbil_streak') || '{}');
      const today = new Date().toISOString().split('T')[0];
      const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
      if(data.lastDate === today) return data;
      if(data.lastDate === yesterday) return {...data, count: (data.count||0)+1, lastDate: today};
      return {count: 1, lastDate: today, best: data.best || 0};
    } catch { return {count:1, lastDate:new Date().toISOString().split('T')[0], best:0}; }
  });
  const updateStreak = () => {
    const today = new Date().toISOString().split('T')[0];
    if(streak.lastDate !== today) {
      const newStreak = {...streak, count: streak.count+1, lastDate: today, best: Math.max(streak.best||0, streak.count+1)};
      setStreak(newStreak);
      try { localStorage.setItem('matbil_streak', JSON.stringify(newStreak)); } catch {}
    }
  };
  const [rahatMod, setRahatMod] = useState(() => { try { return localStorage.getItem('matbil_rahat_mod') === 'true'; } catch { return false; } });
  const toggleRahat = () => { const v = !rahatMod; setRahatMod(v); try { localStorage.setItem('matbil_rahat_mod', v ? 'true' : 'false'); } catch {} };
    const [progress, setProgress] = useState({});

  // CSS animasyonlarını enjekte et
  useEffect(() => {
    if (!document.getElementById('game-anims')) {
      const style = document.createElement('style');
      style.id = 'game-anims';
      style.textContent = feedbackAnim;
      document.head.appendChild(style);
    }
  }, []);

  // Kullanıcı girişinde progress yükle
  useEffect(() => {
    if (user) setProgress(getProgress(user.id));
  }, [user]);

  // Oturum kontrolü (sayfa yenilemede)
  useEffect(() => {
    try {
      const last = localStorage.getItem('matbil_current_user');
      if (last) setUser(JSON.parse(last));
    } catch {}
  }, []);

  const handleLogin = (u) => {
    setUser(u);
    localStorage.setItem('matbil_current_user', JSON.stringify(u));
  };

  const handleLogout = () => {
    setUser(null);
    setCurrentGame(null);
    setView('home');
    localStorage.removeItem('matbil_current_user');
  };

  const handleGameComplete = (gameId, score, level) => {
    updateStreak();
    if (!user) return;
    const prev = progress[gameId] || { attempts: 0, bestScore: 0, maxLevel: 0, stars: 0 };
    const maxPossible = TOTAL_ROUNDS * 30 * level;
    const pct = Math.min(100, Math.round((score / Math.max(maxPossible, 1)) * 100));
    const stars = pct >= 90 ? 3 : pct >= 60 ? 2 : pct >= 30 ? 1 : 0;
    const updated = {
      ...prev,
      attempts: prev.attempts + 1,
      bestScore: Math.max(prev.bestScore, score),
      lastScore: score,
      maxLevel: Math.max(prev.maxLevel || 0, level),
      stars: Math.max(prev.stars || 0, stars),
      lastPlayed: new Date().toISOString(),
    };
    const newProgress = { ...progress, [gameId]: updated };
    setProgress(newProgress);
    saveProgress(user.id, newProgress);
  };

  // Giriş sayfası
  if (!user) return <LoginScreen onLogin={handleLogin} />;

  // Raporlama
  if (view === 'report') return <ReportScreen user={user} progress={progress} onBack={() => setView('home')} onPDF={() => setView('pdf')} />;
  if (view === 'pdf') return <PDFReportView user={user} progress={progress} onBack={() => setView('home')} />;
  if (view === 'admin') return <AdminPanel onBack={() => setView('home')} />;

  // Oyun ekranı
  if (currentGame) {
    const game = GAMES[currentGame];
    const GameComp = game.comp;
    const prevBest = progress[currentGame]?.bestScore || 0;
    return <GameComp onBack={() => setCurrentGame(null)} colors={COLORS[game.cat]}
      rahatMod={rahatMod} sesAcik={sesAcik} prevBest={prevBest}
      onGameComplete={(score, level) => handleGameComplete(currentGame, score, level)} />;
  }

  // Ana Ekran - Accordion Menü
  const toggleCat = (catId) => { setExpandedCat(expandedCat === catId ? null : catId); };
  
  return (
    <div className={`h-screen bg-gradient-to-b from-indigo-50 via-purple-50 to-pink-50 flex flex-col overflow-hidden ${buyukYazi ? "text-lg" : ""}`} role="main" aria-label="Matematiksel Bilişin Temelleri Ana Menü">
      <div className="w-full max-w-md mx-auto flex flex-col flex-1 min-h-0 p-3">

        {/* Üst Bar: Kullanıcı + Çıkış + Rapor (SABİT) */}
        <div className="flex items-center justify-between mb-2 bg-white rounded-xl shadow-md p-2 shrink-0">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center text-white font-bold text-xs">{user.name.charAt(0).toUpperCase()}</div>
            <div>
              <div className="font-bold text-gray-800 text-sm leading-tight">{user.name}</div>
              {(user.age || user.city) && <div className="text-[10px] text-gray-400">{user.age && `${user.age} yaş`}{user.age && user.city && ' · '}{user.city || ''}</div>}
            </div>
          </div>
          <div className="flex items-center gap-1.5">
            <button onClick={() => setView('report')} className="px-2.5 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg font-bold text-xs hover:bg-indigo-100 transition-colors">📊 Rapor</button>
            <button onClick={toggleYazi} aria-label={buyukYazi?'Büyük yazı aktif':'Normal yazı'} className={`px-2 py-1.5 rounded-lg font-bold text-xs transition-colors ${buyukYazi ? 'bg-orange-100 text-orange-600' : 'bg-gray-50 text-gray-400'}`} title={buyukYazi ? 'Büyük Yazı' : 'Normal Yazı'}>{buyukYazi ? 'A+' : 'A'}</button>
            <button onClick={toggleSes} aria-label={sesAcik?'Ses açık':'Ses kapalı'} className={`px-2 py-1.5 rounded-lg font-bold text-xs transition-colors ${sesAcik ? 'bg-blue-100 text-blue-600' : 'bg-gray-50 text-gray-400'}`} title={sesAcik ? 'Ses: Açık' : 'Ses: Kapalı'}>{sesAcik ? '🔊' : '🔇'}</button>
            <button onClick={toggleRahat} aria-label={rahatMod?'Rahat mod aktif':'Normal mod'} className={`px-2 py-1.5 rounded-lg font-bold text-xs transition-colors ${rahatMod ? 'bg-green-100 text-green-600' : 'bg-gray-50 text-gray-400'}`} title={rahatMod ? 'Rahat Mod: Açık' : 'Rahat Mod: Kapalı'}>🐢</button>
            <button onClick={() => setView('admin')} className="px-2 py-1.5 bg-slate-50 text-slate-500 rounded-lg font-bold text-xs hover:bg-slate-100 transition-colors">🔐</button>
            <button onClick={handleLogout} className="px-2 py-1.5 bg-gray-100 text-gray-500 rounded-lg font-bold text-xs hover:bg-gray-200 transition-colors">🚪</button>
          </div>
        </div>

        {/* Başlık + İlerleme (SABİT) */}
        <div className="shrink-0">
          <div className="text-center mb-2">
            <h1 className="text-lg font-bold text-gray-800">🧠 Matematiksel Bilişin Temelleri</h1>
            <p className="text-indigo-700 font-semibold text-xs italic">Sayı Hissinden Şekil Algısına</p>
          </div>
          <div className="flex gap-2 mb-2">
            {(() => {
              const played = Object.keys(progress).length;
              const total = Object.keys(GAMES).length;
              const totalStars = Object.values(progress).reduce((s, g) => s + (g.stars || 0), 0);
              return (<>
                <div className="flex-1 bg-white rounded-lg shadow p-1.5 text-center">
                  <div className="text-sm font-bold text-indigo-600">{played}/{total}</div>
                  <div className="text-[10px] text-gray-500 font-medium">Oyun</div>
                </div>
                <div className="flex-1 bg-white rounded-lg shadow p-1.5 text-center">
                  <div className="text-sm font-bold text-yellow-600">⭐{totalStars}</div>
                  <div className="text-[10px] text-gray-500 font-medium">Yıldız</div>
                </div>
                <div className="flex-1 bg-white rounded-lg shadow p-1.5 text-center">
                  <div className="text-sm font-bold text-green-600">{Object.values(progress).reduce((s, g) => s + (g.attempts || 0), 0)}</div>
                  <div className="text-[10px] text-gray-500 font-medium">Deneme</div>
                </div>
              </>);
            })()}
          </div>
        </div>


        {/* 🏆 Başarı Rozetleri */}
        {(() => { const earned = checkBadges(progress); return earned.length > 0 ? (
          <div className="shrink-0 mb-2 bg-gradient-to-r from-yellow-50 via-amber-50 to-orange-50 rounded-xl border border-amber-200 p-2">
            <div className="text-xs font-bold text-amber-700 mb-1">🏆 Rozetlerin ({earned.length}/{BADGES.length})</div>
            <div className="flex gap-1.5 flex-wrap">{earned.map(b => (
              <div key={b.id} className="bg-white rounded-lg px-2 py-1 shadow-sm border border-amber-100 flex items-center gap-1" title={b.desc}>
                <span className="text-base">{b.emoji}</span>
                <span className="text-[10px] font-bold text-gray-700">{b.name}</span>
              </div>
            ))}</div>
          </div>
        ) : null; })()}

                {/* 🔥 Streak (Ardışık Gün) */}
        {streak.count > 0 && (
          <div className="shrink-0 mb-2 bg-gradient-to-r from-orange-50 via-red-50 to-amber-50 rounded-xl border border-orange-200 p-2.5 flex items-center gap-3">
            <div className="text-3xl">🔥</div>
            <div className="flex-1">
              <div className="font-bold text-orange-700 text-sm">{streak.count} gün seri!</div>
              <div className="text-[10px] text-gray-500">{streak.best > streak.count ? `En iyi: ${streak.best} gün` : streak.count >= 7 ? 'Harika devam et!' : 'Her gün oyna, serini uzat!'}</div>
            </div>
            <div className="flex gap-0.5">{Array.from({length:Math.min(7,streak.count)},(_,i)=><div key={i} className="w-2 h-5 bg-orange-400 rounded-full"/>)}{Array.from({length:Math.max(0,7-streak.count)},(_,i)=><div key={i} className="w-2 h-5 bg-gray-200 rounded-full"/>)}</div>
          </div>
        )}

                {/* 🎯 Sana Önerilen Oyun (Aralıklı Tekrar + Zayıf Alan) */}
        {(() => {
          const unplayed = Object.entries(GAMES).filter(([id]) => !progress[id]);
          const weak = Object.entries(progress).filter(([,d]) => d.stars <= 1 && d.attempts >= 1).sort(([,a],[,b]) => a.stars - b.stars);
          // Aralıklı tekrar: 3+ gün önce oynananlar tekrar önerilir
          const now = Date.now();
          const stale = Object.entries(progress).filter(([,d]) => {
            if(!d.lastPlayed) return false;
            const daysSince = (now - new Date(d.lastPlayed).getTime()) / (1000*60*60*24);
            return daysSince >= 3 && d.stars < 3;
          }).sort(([,a],[,b]) => new Date(a.lastPlayed) - new Date(b.lastPlayed));
          // Bilgi grafiği bazlı akıllı öneri (DBN-inspired)
          const graphRec = recommendNext(progress);
          const rec = weak.length > 0 ? weak[0] : (stale.length > 0 ? stale[0] : (graphRec ? [graphRec, progress[graphRec]] : (unplayed.length > 0 ? unplayed[Math.floor(Math.random()*unplayed.length)] : null)));
          if(!rec) return null;
          const [recId] = rec;
          const game = GAMES[recId];
          if(!game) return null;
          const isWeak = weak.length > 0 && rec === weak[0];
          return (
            <button onClick={() => setCurrentGame(recId)} className="shrink-0 mb-2 w-full bg-gradient-to-r from-indigo-50 via-blue-50 to-cyan-50 border-2 border-indigo-200 rounded-xl p-2.5 flex items-center gap-3 hover:shadow-lg hover:border-indigo-300 transition-all group">
              <div className="w-10 h-10 bg-gradient-to-br from-indigo-400 to-blue-500 rounded-lg flex items-center justify-center text-white text-lg shadow-md group-hover:scale-110 transition-transform">{game.emoji}</div>
              <div className="flex-1 text-left">
                <div className="font-bold text-gray-800 text-sm">🎯 Sana Önerilen: {game.name}</div>
                <div className="text-[10px] text-gray-500">{isWeak ? 'Bu oyunda gelişim fırsatın var!' : (stale.length > 0 && rec === stale[0] ? 'Tekrar zamanı geldi! 🔄' : 'Henüz denemediğin bir oyun!')}</div>
              </div>
              <div className="px-2.5 py-1 bg-indigo-500 text-white rounded-lg text-xs font-bold shadow group-hover:bg-indigo-600 transition-colors">▶ Oyna</div>
            </button>
          );
        })()}

                {/* 📥 Kâğıt-Kalem Etkinlik Kitapçığı İndirme */}
        <div className="shrink-0 mb-2">
          <button onClick={downloadEtkinlikPDF}
            className="w-full bg-gradient-to-r from-amber-50 via-orange-50 to-yellow-50 border-2 border-amber-200 rounded-xl p-2.5 flex items-center gap-3 hover:shadow-lg hover:border-amber-300 transition-all group">
            <div className="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg flex items-center justify-center text-white text-lg shadow-md group-hover:scale-110 transition-transform">📝</div>
            <div className="flex-1 text-left">
              <div className="font-bold text-gray-800 text-sm">Kâğıt-Kalem Etkinlik Kitapçığı</div>
              <div className="text-[10px] text-gray-500">14 etkinlik · 5 kategori · Yazdır & çöz</div>
            </div>
            <div className="px-2.5 py-1 bg-amber-500 text-white rounded-lg text-xs font-bold shadow group-hover:bg-amber-600 transition-colors">📥 İndir</div>
          </button>
        </div>

        {/* Accordion Kategoriler (KAYDIRILAN ALAN) */}
        <div className="flex-1 min-h-0 overflow-y-auto scroll-area">
          <div className="space-y-1.5 pb-10">
            {CATEGORIES.map(cat => {
              const isOpen = expandedCat === cat.id;
              const catGames = Object.entries(GAMES).filter(([, g]) => g.cat === cat.id);
              const catPlayed = catGames.filter(([id]) => progress[id]).length;
              const catStars = catGames.reduce((s, [id]) => s + (progress[id]?.stars || 0), 0);

              return (
                <div key={cat.id} className="rounded-xl overflow-hidden shadow-lg">
                  {/* Kategori Başlığı */}
                  <button onClick={() => toggleCat(cat.id)}
                    className={`w-full py-3 px-4 bg-gradient-to-r ${cat.color.gradient} text-white font-bold text-sm flex items-center gap-2 hover:opacity-95 transition-all`}>
                    <span className="text-xl">{cat.emoji}</span>
                    <div className="flex-1 text-left">
                      <div className="leading-tight">{cat.name}</div>
                      <div className="text-[11px] opacity-90 font-medium">{cat.desc}</div>
                    </div>
                    <div className="flex items-center gap-1.5">
                      {catPlayed > 0 && <span className="bg-white/20 px-1.5 py-0.5 rounded-full text-[10px]">{catPlayed}/{catGames.length}</span>}
                      {catStars > 0 && <span className="text-[10px]">⭐{catStars}</span>}
                      <span className={`transition-transform duration-300 text-base ${isOpen ? 'rotate-180' : ''}`}>▾</span>
                    </div>
                  </button>

                  {/* Açılan Oyun Listesi */}
                  {isOpen && (
                    <div className={`${cat.color.bg} border-x-2 border-b-2 ${cat.color.border} rounded-b-xl`}>
                      {cat.id === 'D' && <div className="text-center text-xs font-bold text-emerald-600 pt-2 pb-1 tracking-wide">📦 Küçük Uzay (Nesne)</div>}
                      {catGames.map(([id, g]) => {
                        const gp = progress[id];
                        return (
                          <React.Fragment key={id}>
                            {cat.id === 'D' && id === 'D4' && <div className="text-center text-xs font-bold text-emerald-600 pt-2 pb-1 tracking-wide">🌍 Büyük Uzay (Mekân)</div>}
                            <div className="mx-1.5 mb-0.5">
                              <button onClick={() => setCurrentGame(id)}
                                className="w-full py-2 px-3 bg-white/80 hover:bg-white hover:shadow-md rounded-lg flex items-center gap-2 transition-all">
                                <span className="text-lg">{g.emoji}</span>
                                <span className="flex-1 text-left font-semibold text-gray-800 text-sm">{g.name}</span>
                                {gp && <div className="flex gap-0.5">{[1,2,3].map(i => <span key={i} className="text-xs">{i <= (gp.stars || 0) ? '⭐' : '☆'}</span>)}</div>}
                                <span className="text-gray-300 text-sm">›</span>
                              </button>
                            </div>
                          </React.Fragment>
                        );
                      })}
                      <div className="h-1"/>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Krediler */}
            <div className="text-center pt-3 pb-2">
              <p className="text-[10px] text-gray-400">Prof. Dr. Yılmaz Mutlu • Prof. Dr. Sinan Olkun</p>
              <p className="text-[10px] text-gray-300">v14.0 • {Object.keys(GAMES).length} Oyun</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};



ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
