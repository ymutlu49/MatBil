const downloadEtkinlikPDF = () => {
  const byteChars = atob(ETKINLIK_PDF_B64);
  const byteNumbers = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
  const blob = new Blob([new Uint8Array(byteNumbers)], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Etkinlik_Kitapcigi_KagitKalem.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

const Feedback = ({ isCorrect, answer, hint, colors }) => {
  useEffect(() => { playSound(isCorrect ? 'correct' : 'wrong'); vibrate(isCorrect ? 50 : [30,50,30]); }, []);
  return (
  <div className={`text-center ${isCorrect ? 'anim-pop' : 'anim-shake'}`}>
    <div className={`text-2xl font-bold mb-2 ${isCorrect ? 'text-green-500' : 'text-orange-500'}`}>
      {isCorrect ? '✓ Doğru!' : `${encourage()} Cevap: ${answer}`}
    </div>
    {hint && <div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700 max-w-sm mx-auto anim-fade">💡 {hint}</div>}
  </div>
);};

const GameHeader = ({ onBack, onLevelMenu, round, score, title, colors, total, hideRound }) => {

  return (
    <div className={`w-full ${colors?.light || 'bg-gray-100'} rounded-xl p-2 mb-2 shadow-md border ${colors?.border || 'border-gray-200'} relative`}>

        <div className="absolute top-full left-0 right-0 z-50 mt-1 mx-1 bg-white rounded-xl shadow-2xl border-2 border-indigo-200 p-3 anim-fade">

            <div className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">🧠 {help.goal}</div>
            <button onClick={() => setShowHelp(false)} className="text-gray-400 text-lg leading-none hover:text-gray-600">×</button>

          <button onClick={onBack} className="px-2 py-1.5 bg-gray-200 text-gray-600 rounded-lg font-bold text-xs hover:bg-gray-300">🏠</button>
        </div>
        <div className={`${colors?.text || 'text-gray-700'} font-bold text-sm truncate max-w-[140px]`}>{title}</div>

      </div>}

};

const ResultScreen = ({ score, onReplay, onBack, onLevelMenu, colors, onComplete, level, maxLevel, onNextLevel, prevBest }) => {
  useEffect(() => { if (onComplete) onComplete(score, level || 1); }, []);
  const maxScore = (TOTAL_ROUNDS * 30 * (level || 1));
  const pct = Math.min(100, Math.round((score / Math.max(maxScore, 1)) * 100));
  const stars = pct >= 90 ? 3 : pct >= 60 ? 2 : pct >= 30 ? 1 : 0;
  const isNewRecord = prevBest > 0 && score > prevBest;
  const msg = isNewRecord ? 'Yeni Rekor! 🏅' : stars === 3 ? 'Mükemmel! 🌟' : stars === 2 ? 'Çok iyi! 👏' : stars === 1 ? 'İyi başlangıç! 💪' : 'Tekrar dene! 🔄';
  const canNext = stars >= 2 && level && maxLevel && level < maxLevel;
  return (
    <div className={`h-screen ${colors?.bg || 'bg-gray-50'} flex flex-col items-center justify-center p-3 overflow-hidden anim-slide-up`}>
      <div className="text-5xl mb-2 anim-pop">{isNewRecord ? '🏅' : stars >= 2 ? '🏆' : '🎯'}</div>
      <h2 className="text-2xl font-bold text-gray-800 mb-1">{msg}</h2>
      <div className="flex gap-1 mb-3">{[1,2,3].map(i => <span key={i} className="text-3xl">{i <= stars ? '⭐' : '☆'}</span>)}</div>
      <div className="bg-yellow-100 px-8 py-3 rounded-2xl mb-3 border-4 border-yellow-300">
        <span className="text-5xl font-bold text-yellow-600">{score}</span>
        <span className="text-yellow-600 text-xl ml-2">Puan</span>
      </div>
      {prevBest > 0 && <div className={`text-sm mb-3 px-4 py-1.5 rounded-full ${isNewRecord ? 'bg-green-100 text-green-700 font-bold' : 'bg-gray-100 text-gray-500'}`}>
        {isNewRecord ? `Önceki rekor: ${prevBest} → Yeni: ${score} 🎉` : `Kişisel rekorun: ${prevBest}`}
      </div>}
      <div className="space-y-2 w-64">
        {canNext && <button onClick={() => onNextLevel ? onNextLevel(level + 1) : null} className={`w-full py-3 ${colors?.button || 'bg-indigo-500'} text-white rounded-xl font-bold text-base shadow-lg animate-pulse`}>▶ Sonraki Seviye</button>}
        <button onClick={onReplay} className={`w-full py-3 ${canNext ? 'bg-white border-2 border-gray-300 text-gray-700' : (colors?.button || 'bg-indigo-500') + ' text-white'} rounded-xl font-bold text-base`}>🔄 Tekrar Oyna</button>
        {onLevelMenu && <button onClick={onLevelMenu} className="w-full py-3 bg-blue-100 text-blue-700 rounded-xl font-bold text-base">📋 Düzey Menüsü</button>}
        <button onClick={onBack} className="w-full py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-base">🏠 Ana Menü</button>
      </div>
    </div>
  );
};

// ==================== A1: NOKTA AVCISI ====================
const NoktaAvcisi = ({ onBack, colors, onGameComplete, rahatMod }) => {
  const [gs, setGs] = useState('menu');
  const [lv, setLv] = useState(1);
  const [sc, setSc] = useState(0);
  const [rd, setRd] = useState(0);
  const [dc, setDc] = useState(0);
  const [dots, setDots] = useState([]);
  const [show, setShow] = useState(false);
  const [ua, setUa] = useState(null);
  const last = useRef([]);
  const cfg = { 1: { min: 1, max: 4, t: 2000 }, 2: { min: 2, max: 5, t: 1500 }, 3: { min: 3, max: 7, t: 1200 }, 4: { min: 4, max: 9, t: 1000 } };
  const dCols = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6'];

  // Kanonik dizilimler (zar deseni, % pozisyon)
  const canonical = {
    1: [[50,50]],
    2: [[30,30],[70,70]],
    3: [[30,25],[70,25],[50,70]],
    4: [[30,30],[70,30],[30,70],[70,70]],
    5: [[30,25],[70,25],[50,50],[30,75],[70,75]],
  };

  // 6-9 için gruplu dizilimler: 2 veya 3 alt grup
  const groupLayouts = {
    6: [
      {groups:[[3,3]], pos:[[[20,25],[20,50],[20,75]], [[75,25],[75,50],[75,75]]]},           // 3+3 dikey
      {groups:[[3,3]], pos:[[[25,25],[50,25],[75,25]], [[25,70],[50,70],[75,70]]]},           // 3+3 yatay
      {groups:[[2,2,2]], pos:[[[18,30],[18,70]], [[50,30],[50,70]], [[82,30],[82,70]]]},      // 2+2+2
    ],
    7: [
      {groups:[[4,3]], pos:[[[20,20],[20,45],[20,70],[20,90]], [[75,25],[75,50],[75,75]]]},   // 4+3
      {groups:[[3,4]], pos:[[[25,25],[50,25],[75,25]], [[18,70],[38,70],[58,70],[78,70]]]},   // 3+4
      {groups:[[3,2,2]], pos:[[[18,25],[18,50],[18,75]], [[55,30],[55,65]], [[85,30],[85,65]]]}, // 3+2+2
    ],
    8: [
      {groups:[[4,4]], pos:[[[22,20],[22,42],[22,64],[22,86]], [[78,20],[78,42],[78,64],[78,86]]]}, // 4+4
      {groups:[[3,3,2]], pos:[[[18,25],[18,50],[18,75]], [[50,25],[50,50],[50,75]], [[82,35],[82,65]]]}, // 3+3+2
      {groups:[[5,3]], pos:[[[20,18],[20,40],[20,62],[20,84],[20,96]].slice(0,5), [[75,25],[75,50],[75,75]]]}, // 5+3
    ],
    9: [
      {groups:[[5,4]], pos:[[[20,15],[20,35],[20,55],[20,75],[20,92]], [[78,22],[78,42],[78,62],[78,82]]]}, // 5+4
      {groups:[[3,3,3]], pos:[[[18,25],[18,50],[18,75]], [[50,25],[50,50],[50,75]], [[82,25],[82,50],[82,75]]]}, // 3+3+3
      {groups:[[4,3,2]], pos:[[[15,20],[15,42],[15,64],[15,86]], [[50,25],[50,50],[50,75]], [[85,35],[85,65]]]}, // 4+3+2
    ],
  };

  const genDots = (count) => {
    const col1 = dCols[Math.floor(Math.random()*dCols.length)];
    // Kanonik vs Non-kanonik rastgele seçim (MacDonald-Wilkins modeli)
    const useRandom = Math.random() < 0.4; // %40 non-kanonik desen

    if(count <= 5) {
      if(useRandom) {
        // Non-kanonik: rastgele pozisyonlar (kavramsal sanbili zorlayan desen)
        const usedPos = [];
        const rndDots = Array.from({length:count}, () => {
          let x,y,ok;
          do { x=15+Math.random()*70; y=15+Math.random()*70; ok=usedPos.every(p=>Math.hypot(p[0]-x,p[1]-y)>18); } while(!ok && usedPos.length>0);
          usedPos.push([x,y]);
          return { x, y, c: col1 };
        });
        return { type:'random', groups:[{ dots: rndDots }]};
      }
      // Kanonik dizilim + küçük rastgele sapma
      const pattern = canonical[count];
      return { type:'canonical', groups:[{
        dots: pattern.map(([x,y]) => ({
          x: x + (Math.random()*6-3),
          y: y + (Math.random()*6-3),
          c: col1
        }))
      }]};
    }

    // 6-9: Gruplu dizilim seç
    const layouts = groupLayouts[count];
    const layout = layouts[Math.floor(Math.random()*layouts.length)];
    const groupColors = [col1];
    // Her gruba farklı renk
    let ci=0;
    while(groupColors.length < layout.pos.length){
      ci++;
      const nc = dCols[(dCols.indexOf(col1)+ci) % dCols.length];
      if(nc!==col1) groupColors.push(nc);
      else groupColors.push(dCols[(ci+2)%dCols.length]);
    }

    const groups = layout.pos.map((grpPos, gi) => ({
      dots: grpPos.map(([x,y]) => ({
        x: x + (Math.random()*4-2),
        y: y + (Math.random()*4-2),
        c: groupColors[gi % groupColors.length]
      }))
    }));

    return { type:'grouped', groups };
  };

  const getC = (cf) => { let c,a=0; do{c=Math.floor(Math.random()*(cf.max-cf.min+1))+cf.min;a++;}while(last.current.includes(c)&&a<10); last.current.push(c); if(last.current.length>3)last.current.shift(); return c; };
  const startR = useCallback((l,r) => { const cf=cfg[l]; const c=getC(cf); setDc(c); setDots(genDots(c)); setShow(true); setUa(null); setRd(r); setTimeout(()=>setShow(false), Math.round((rahatMod ? cf.t * 1.5 : cf.t) / adaptive.diff)); },[rahatMod]);
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG = (l) => { setLv(l); setSc(0); last.current=[]; adaptive.reset(); setGs('playing'); startR(l,1); };
  const handle = (a) => { setUa(a); adaptive.record(a===dc); if(a===dc){setSc(s=>s+10*lv);speakNumber(dc);} setTimeout(()=>{if(rd<TOTAL_ROUNDS)startR(lv,rd+1);else setGs('results');},1200); };
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Nokta Avcısı" emoji="🎯" description="Noktalar kısa süre gösterilecek. Saymadan, bakarak kaç tane olduğunu bul!" levels={['⭐ Seviye 1 (1-4, 2sn)','⭐⭐ Seviye 2 (2-5, 1.5sn)','⭐⭐⭐ Seviye 3 (3-7, 1.2sn)','⭐⭐⭐⭐ Seviye 4 (4-9, 1sn)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Nokta Avcısı" emoji="🎯" level={lv} instruction="Ekranda noktalar kısa süreliğine görünüp kaybolacak. Kaç nokta olduğunu saymadan, bir bakışta bulmaya çalış!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Nokta Avcısı" colors={colors} hideRound={rahatMod}/>
      <div className={`w-56 h-56 bg-white rounded-3xl shadow-xl relative mb-3 border-4 ${colors?.border}`}>
        {show && dots?.groups?.map((grp,gi)=>(
          grp.dots.map((d,di)=>(
            <div key={`${gi}-${di}`} className="absolute w-9 h-9 rounded-full shadow-lg" style={{left:`${d.x}%`,top:`${d.y}%`,backgroundColor:d.c,transform:'translate(-50%,-50%)'}}/>
          ))
        ))}
        {!show && ua===null && <div className="absolute inset-0 flex flex-col items-center justify-center"><span className="text-4xl mb-1">🤔</span><span className={`text-lg font-bold ${colors?.text}`}>Kaç taneydi?</span></div>}
        {ua!==null && <Feedback isCorrect={ua===dc} answer={dc} hint={ua===dc ? `Harika! ${dc} tane vardı.` : `${dc} tane vardı. ${dots?.type==='random' ? 'Rastgele dizilimde grupla düşün: kaçlı gruplar görüyorsun?' : 'Bildiğin desenleri ara: zar, domino gibi!'}`}/>}
      </div>
      {!show && ua===null && <div className="grid grid-cols-5 gap-2">{Array.from({length:9},(_,i)=>i+1).map(n=>(<button key={n} onClick={()=>handle(n)} className={`w-14 h-14 ${colors?.button} text-white rounded-2xl font-bold text-xl shadow-lg hover:scale-105 transition-transform`}>{n}</button>))}</div>}
    </div>
  );
};

// ==================== A2: KAÇ PARMAK ====================
const ParmakSansi = ({ onBack, colors, onGameComplete, rahatMod }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [fc,setFc]=useState(0);const [ua,setUa]=useState(null);
  const cfg={1:{max:5},2:{max:7},3:{max:10},4:{max:10}};

  const Hand=({fingers,mirror=false})=>{
    // Parmak açıklık durumu: mirror=sağ el, normal=sol el
    // Sol el: başparmak=0, işaret=1, orta=2, yüzük=3, serçe=4
    const isOpen=(i)=> mirror ? i < fingers : (4-i) < fingers;

    // Parmak SVG path verileri: [x, kapalıY, açıkY, genişlik, eğrilik]
    const fingerData = [
      { x: 18, openH: 55, closedH: 22, w: 22, curve: -12, nail: true },  // başparmak
      { x: 38, openH: 75, closedH: 22, w: 19, curve: 0, nail: true },    // işaret
      { x: 58, openH: 82, closedH: 22, w: 18, curve: 0, nail: true },    // orta
      { x: 77, openH: 72, closedH: 22, w: 17, curve: 0, nail: true },    // yüzük
      { x: 94, openH: 58, closedH: 22, w: 16, curve: 8, nail: true },    // serçe
    ];

    return (
      <svg width="140" height="200" viewBox="0 0 130 185" style={{transform: mirror ? 'scaleX(-1)' : 'none'}}>
        {/* Avuç içi */}
        <rect x="22" y="110" width="86" height="65" rx="22" ry="22" fill="#FBBF24" stroke="#D97706" strokeWidth="2"/>
        {/* Bilek */}
        <rect x="38" y="160" width="52" height="24" rx="8" fill="#FBBF24" stroke="#D97706" strokeWidth="2"/>
        {/* Parmaklar */}
        {fingerData.map((f, i) => {
          const open = isOpen(i);
          const h = open ? f.openH : f.closedH;
          const y = 115 - h;
          const cx = f.x + f.w / 2;
          return (
            <g key={i}>
              <rect
                x={f.x} y={y} width={f.w} height={h}
                rx={f.w/2} ry={f.w/2}
                fill={open ? '#FBBF24' : '#F59E0B'}
                stroke="#D97706" strokeWidth="2"
                opacity={open ? 1 : 0.4}
                transform={i===0 ? `rotate(${f.curve}, ${cx}, 115)` : (i===4 ? `rotate(${f.curve}, ${cx}, 115)` : '')}
              />
              {/* Tırnak */}
              {open && (
                <rect
                  x={f.x + f.w*0.2} y={y + 4} width={f.w*0.6} height={f.w*0.55}
                  rx={4} ry={4}
                  fill="#FDE68A" stroke="#F59E0B" strokeWidth="1"
                  transform={i===0 ? `rotate(${f.curve}, ${cx}, 115)` : (i===4 ? `rotate(${f.curve}, ${cx}, 115)` : '')}
                />
              )}
              {/* Eklem çizgileri */}
              {open && h > 40 && (
                <line
                  x1={f.x+3} y1={y + h*0.45} x2={f.x+f.w-3} y2={y + h*0.45}
                  stroke="#D97706" strokeWidth="1" opacity="0.3"
                  transform={i===0 ? `rotate(${f.curve}, ${cx}, 115)` : (i===4 ? `rotate(${f.curve}, ${cx}, 115)` : '')}
                />
              )}
            </g>
          );
        })}
      </svg>
    );
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setFc(Math.floor(Math.random()*cfg[l].max)+1);setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===fc)setSc(s=>s+10*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setFc(Math.floor(Math.random()*cfg[lv].max)+1);setUa(null);}else setGs('results');},1200);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Kaç Parmak?" emoji="🖐️" description="Parmak sayısını hızlıca say! Ellerdeki açık parmakları saymadan tanımaya çalış." levels={['Seviye 1 (1-5)','Seviye 2 (1-7)','Seviye 3 (1-10)','Seviye 4 (1-10 Hızlı)']} colors={colors}/>;

        x: Math.max(2, Math.min(138, 8 + col * cellW + cellW/2 + jitterX)),
        y: Math.max(8, Math.min(198, 190 - (row+1) * cellH + cellH/2 + jitterY)),

  const guess = parseInt(ug) || 0;

            <button onClick={()=>setUg(String(Math.max(1,(parseInt(ug)||0)-1)))} className="w-14 h-14 bg-amber-300 rounded-xl font-bold text-2xl">−</button>

            <button onClick={()=>setUg(String((parseInt(ug)||0)+5))} className="w-12 h-12 bg-gray-300 rounded-xl font-bold text-xl">+5</button>
          </div>
          <button onClick={handleSub} disabled={!ug || ug==='0'}
            className={`px-10 py-4 rounded-xl font-bold text-lg shadow-lg transition-all ${ug && ug!=='0' ? `${colors?.button} text-white hover:scale-105` : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>
            Tahmin Et
          </button>
        </div>
      ) : (
        <div className={`text-center ${diff===0?'anim-pop':'anim-fade'}`}>
          <div className="text-2xl font-bold text-gray-700 mb-2">Doğru cevap: {tc}</div>
          <div className={`text-xl font-bold ${diff===0?'text-green-500':diff<=2?'text-green-400':diff<=5?'text-amber-500':'text-orange-500'}`}>
            {diff===0?'🎯 Tam isabet!':diff<=2?'👏 Çok yaklaştın!':diff<=5?`💪 Yakın tahmin! (Fark: ${diff})`:`Fark: ${diff}`}
          </div>
          <div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700 mt-2">
            💡 Kavanozda {tc} bilye vardı. Senin tahminin: {guess}
          </div>
          {!explained && <ExplainStep type="quantity" onDone={handleExplain}/>}
          {explained && <div className="text-xs text-green-600 mt-2 font-medium anim-fade">✓ Harika düşünce!</div>}
        </div>
      )}
    </div>
  );
};

const SayiDogrusu = ({ onBack, colors, onGameComplete, prevBest }) => {
  const adaptive = useAdaptive();
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [target,setTarget]=useState(0);const [opts,setOpts]=useState([]);const [ua,setUa]=useState(null);
  const cfg={1:{max:10,tol:1,step:1},2:{max:100,tol:10,step:1},3:{max:1000,tol:50,step:50}};
  const genR=(l)=>{const c=cfg[l];let t;
    if(l===3){const steps=[50,100,150,200,250,300,350,400,450,500,550,600,650,700,750,800,850,900,950];t=steps[Math.floor(Math.random()*steps.length)];}
    else{t=Math.floor(Math.random()*(c.max-2))+2;}
    setTarget(t);const o=[t];let at=0,sp=l===3?100:3;
    while(o.length<4&&at<60){const delta=l===3?(Math.floor(Math.random()*4)+1)*50*(Math.random()>0.5?1:-1):(Math.floor(Math.random()*sp)+1)*(Math.random()>0.5?1:-1);const v=Math.max(l===3?50:1,Math.min(c.max,t+delta));if(!o.includes(v))o.push(v);at++;if(at>30)sp++;}
    while(o.length<4)o.push(o.length*c.step+t);setOpts(o.sort(()=>Math.random()-0.5));setUa(null);};
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);genR(l);setGs('playing');};
  const getFeedback=(ans,tgt,tol)=>{if(ans===tgt)return{cls:'text-green-500',msg:'✓ Doğru!'};const diff=Math.abs(ans-tgt);if(diff<=tol)return{cls:'text-amber-500',msg:`👏 Çok yaklaştın! Yanıt: ${tgt}`};return{cls:'text-orange-500',msg:`${encourage()} Yanıt: ${tgt}`};};
  const handle=(a)=>{setUa(a);adaptive.record(a===target);const fb=getFeedback(a,target,cfg[lv].tol);const isClose=a===target||Math.abs(a-target)<=cfg[lv].tol;if(a===target)setSc(s=>s+20*lv);else if(isClose)setSc(s=>s+10*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);genR(lv);}else setGs('results');},1500);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Sayı Doğrusu" emoji="📏" description="Ok hangi sayıyı gösteriyor? Sayı doğrusundaki konumu tahmin et!" levels={['Seviye 1 (0-10)','Seviye 2 (0-100)','Seviye 3 (0-1000)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Sayı Doğrusu" emoji="📏" level={lv} instruction="Sayı doğrusu üzerinde bir ok gösterilecek. Okun gösterdiği sayıyı seçenekler arasından bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={3} onNextLevel={startG} prevBest={prevBest}/>;
  const mx=cfg[lv].max;const pct=(target/mx)*100;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Sayı Doğrusu" colors={colors}/>
      <p className={`${colors?.text} mb-3 text-center font-bold text-lg`}>Ok hangi sayıyı gösteriyor?</p>
      <div className="w-full max-w-sm mb-3 px-3">
        <div className="relative h-8 mb-1"><div className="absolute flex flex-col items-center" style={{left:`${pct}%`,transform:'translateX(-50%)'}}><div className="text-2xl">⬇️</div></div></div>
        <div className="relative">
          <div className="h-2 bg-amber-400 border border-amber-600" style={{borderRadius:0}}/>
          <div className="absolute top-0 w-1 h-4 bg-red-600" style={{left:`${pct}%`,transform:'translate(-50%,-25%)'}}/> 
          <div className="absolute bg-amber-700 h-5 w-0.5" style={{left:'0%',top:-2,transform:'translateX(-50%)'}}/>
          <div className="absolute bg-amber-700 h-5 w-0.5" style={{left:'100%',top:-2,transform:'translateX(-50%)'}}/>
        </div>
        <div className="flex justify-between text-lg font-bold text-gray-600 mt-2"><span>0</span><span>{mx}</span></div>
      </div>
      {ua!==null?(()=>{const fb=getFeedback(ua,target,cfg[lv].tol);return(<div className="text-center"><div className={`text-2xl font-bold mb-1 ${fb.cls}`}>{fb.msg}</div><div className="bg-amber-50 px-3 py-2 rounded-xl text-sm text-amber-700 mt-1">💡 Ok, 0‑{mx} arasında <strong>{target}</strong> sayısını gösteriyor.</div></div>);})():(<div className="grid grid-cols-2 gap-3 w-full max-w-sm">{opts.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`py-4 ${colors?.button} text-white rounded-2xl font-bold text-2xl shadow-lg active:scale-95 transition-transform`}>{o}</button>))}</div>)}
    </div>
  );
};

const ReferansNoktasi = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const cfg={1:{refs:[0,5,10]},2:{refs:[0,10,20]},3:{refs:[0,25,50]},4:{refs:[0,50,100]}};
  const gen=(l)=>{const c=cfg[l];const ri=Math.floor(Math.random()*(c.refs.length-1));const r1=c.refs[ri],r2=c.refs[ri+1];let n;do{n=Math.floor(Math.random()*(r2-r1-1))+r1+1;}while(Math.abs(n-r1)===Math.abs(n-r2));const a=Math.abs(n-r1)<Math.abs(n-r2)?r1:r2;return{number:n,ref1:r1,ref2:r2,answer:a};};
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.answer)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Yakınlık Tahmini" emoji="🎯" description="Sayı hangi referans noktasına daha yakın? Mesafe tahmini yap!" levels={['Seviye 1 (0-5-10)','Seviye 2 (0-10-20)','Seviye 3 (0-25-50)','Seviye 4 (0-50-100)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Yakınlık Tahmini" emoji="🎯" level={lv} instruction="Bir sayı gösterilecek. Bu sayı, verilen iki referans noktasından hangisine daha yakın? Doğru olanı seç!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  const fullMin=cfg[lv].refs[0], fullMax=cfg[lv].refs[cfg[lv].refs.length-1];
  const ballPct=p?((p?.number-fullMin)/(fullMax-fullMin))*100:50;
  const ref1Pct=p?((p?.ref1-fullMin)/(fullMax-fullMin))*100:0;
  const ref2Pct=p?((p?.ref2-fullMin)/(fullMax-fullMin))*100:100;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Yakınlık Tahmini" colors={colors}/>
      <p className={`${colors?.text} mb-2 font-bold text-lg`}>Bu sayı hangisine daha yakın?</p>
      <div className="bg-white px-10 py-4 rounded-2xl shadow-xl mb-3 border-4 border-amber-300"><span className="text-4xl font-bold text-amber-600">{p?.number}</span></div>
      <div className="w-full max-w-xs mb-3 px-2">
        <div className="relative" style={{height:40}}>
          {/* Çizgi */}
          <div className="absolute top-1/2 left-0 right-0 h-1 bg-gray-300 rounded-full" style={{transform:'translateY(-50%)'}}/>
          {/* Uç noktalar */}
          <div className="absolute top-1/2 w-1.5 h-4 bg-gray-500 rounded-full" style={{left:'0%',transform:'translate(-50%,-50%)'}}/>
          <div className="absolute top-1/2 w-1.5 h-4 bg-gray-500 rounded-full" style={{left:'100%',transform:'translate(-50%,-50%)'}}/>
          {/* Referans ayraç (varsa) */}
          {cfg[lv].refs.slice(1,-1).map((r,i)=>{const rp=((r-fullMin)/(fullMax-fullMin))*100;return <div key={i} className="absolute top-1/2 w-0.5 h-3 bg-gray-300" style={{left:`${rp}%`,transform:'translate(-50%,-50%)'}}/>;}) }
          {/* Sayı topu */}
          <div className="absolute top-1/2 w-6 h-6 bg-amber-500 rounded-full border-2 border-white shadow-lg flex items-center justify-center" style={{left:`${ballPct}%`,transform:'translate(-50%,-50%)',zIndex:2}}>
            <span className="text-white text-xs font-bold">{p?.number}</span>
          </div>
        </div>
        <div className="flex justify-between text-base font-bold text-gray-600 mt-1">
          {cfg[lv].refs.map((r,i)=><span key={i} className="bg-blue-50 px-2 py-0.5 rounded text-sm" style={{position:'relative',left:i===0?0:i===cfg[lv].refs.length-1?0:'auto'}}>{r}</span>)}
        </div>
      </div>
      {ua!==null?(<div className="text-center anim-fade"><Feedback isCorrect={ua===p?.answer} answer={p?.answer} hint={`${p?.number}: ${p?.ref1}'e ${Math.abs(p?.number-p?.ref1)} uzaklıkta, ${p?.ref2}'ye ${Math.abs(p?.number-p?.ref2)} uzaklıkta → ${p?.answer}`}/></div>):(<div className="flex gap-4"><button onClick={()=>handle(p?.ref1)} className={`px-8 py-4 ${colors?.button} text-white rounded-2xl font-bold text-2xl shadow-lg active:scale-95 transition-transform`}>{p?.ref1}</button><button onClick={()=>handle(p?.ref2)} className={`px-8 py-4 ${colors?.button} text-white rounded-2xl font-bold text-2xl shadow-lg active:scale-95 transition-transform`}>{p?.ref2}</button></div>)}
    </div>
  );
};

const HesaplamaliTahmin = ({ onBack, colors, onGameComplete, prevBest }) => {
  const adaptive = useAdaptive();
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);

  // "Çirkin" sayı üreteci: yuvarlak sayılardan kaçın
  const uglyNum=(min,max)=>{
    let n;
    do { n=Math.floor(Math.random()*(max-min+1))+min; } while(n%10===0 || n%5===0);
    return n;
  };

  const gen=(l)=>{
    let a,b,answer,op,opSymbol,hint;

    if(l===1){
      // 2 basamaklı toplama: 13+28, 47+36 gibi
      a=uglyNum(12,49); b=uglyNum(12,49);
      answer=a+b; op='add'; opSymbol='+';
      hint=`${Math.round(a/10)*10} + ${Math.round(b/10)*10} ≈ ${Math.round(a/10)*10+Math.round(b/10)*10}`;
    } else if(l===2){
      // 2 basamaklı toplama/çıkarma karışık
      const isAdd=Math.random()>0.4;
      if(isAdd){
        a=uglyNum(23,89); b=uglyNum(14,67);
        answer=a+b; op='add'; opSymbol='+';
      } else {
        a=uglyNum(42,98); b=uglyNum(11,a-10);
        answer=a-b; op='sub'; opSymbol='−';
      }
      hint=`${Math.round(a/10)*10} ${opSymbol} ${Math.round(b/10)*10} ≈ ${op==='add'?Math.round(a/10)*10+Math.round(b/10)*10:Math.round(a/10)*10-Math.round(b/10)*10}`;
    } else if(l===3){
      // 3 basamaklı toplama/çıkarma
      const isAdd=Math.random()>0.4;
      if(isAdd){
        a=uglyNum(103,499); b=uglyNum(103,499);
        answer=a+b; op='add'; opSymbol='+';
      } else {
        a=uglyNum(302,899); b=uglyNum(101,a-100);
        answer=a-b; op='sub'; opSymbol='−';
      }
      hint=`${Math.round(a/100)*100} ${opSymbol} ${Math.round(b/100)*100} ≈ ${op==='add'?Math.round(a/100)*100+Math.round(b/100)*100:Math.round(a/100)*100-Math.round(b/100)*100}`;
    } else {
      // Sv.4: Çarpma tahmini
      a=uglyNum(6,19); b=uglyNum(6,19);
      answer=a*b; op='mul'; opSymbol='×';
      const ra=Math.round(a/5)*5||5, rb=Math.round(b/5)*5||5;
      hint=`${ra} × ${rb} ≈ ${ra*rb}`;
    }

    // Seçenek üreteci: cevaba yakın ama farklı aralıklarda
    const step = l<=2 ? 10 : (l===3 ? 50 : 20);
    const base=Math.round(answer/step)*step;
    let opts=[base-step, base, base+step, base+2*step].filter(x=>x>0);
    opts=[...new Set(opts)];
    // Doğru cevaba en yakını bul
    while(opts.length<4){opts.push(base+(opts.length)*step);}
    opts=opts.slice(0,4);
    const closest=opts.reduce((prev,curr)=>Math.abs(curr-answer)<Math.abs(prev-answer)?curr:prev);
    return{a,b,answer,closest,op,opSymbol,hint,opts:opts.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const [explained3,setExplained3]=useState(false);
  const handle=(a)=>{setUa(a);if(a===p?.closest)setSc(s=>s+20*lv);setExplained3(false);};
  const handleExplain3=()=>{setExplained3(true);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);setExplained3(false);}else setGs('results');},800);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Hesaplamalı Tahmin" emoji="🧮" description="İşlemin sonucuna en yakın sayıyı tahmin et! Yuvarlayarak düşün." levels={['Seviye 1 (2 bsm. toplama)','Seviye 2 (toplama-çıkarma)','Seviye 3 (3 basamaklı)','Seviye 4 (çarpma tahmini)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Hesaplamalı Tahmin" emoji="🧮" level={lv} instruction="Bir işlem gösterilecek. Tam hesaplamadan, yuvarlayarak en yakın sonucu tahmin et!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Hesaplamalı Tahmin" colors={colors}/>
      <div className="bg-white px-5 py-3 rounded-xl shadow-xl mb-3 text-center">
        <div className="text-3xl font-bold text-purple-700">{p?.a} {p?.opSymbol} {p?.b}</div>
        <div className="text-gray-500 text-sm mt-1">Sonuca en yakın sayı hangisi?</div>
      </div>
      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.closest?'text-green-500':'text-orange-500'}`}>{ua===p?.closest?'✓ Doğru!':`${encourage()} En yakın: ${p?.closest}`}</div><div className="text-gray-600 mb-1">Gerçek sonuç: {p?.a} {p?.opSymbol} {p?.b} = {p?.answer}</div><div className="bg-amber-50 p-2 rounded-xl text-sm text-amber-700">💡 Yuvarlama: {p?.hint}</div>{!explained3 && <ExplainStep type="computation" onDone={handleExplain3}/>}{explained3 && <div className="text-xs text-green-600 mt-2 font-medium anim-fade">✓ Akıllıca!</div>}</div>):(<div className="grid grid-cols-2 gap-3">{p?.opts?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

      if(type==='totalFromVisual'){
        a=n; askHL='toplam'; showNumber=false;
        q=`Bu çubuk ve küpler toplam kaç eder?`;
        o=[a,a+10,a-10,tens+ones].filter(x=>x>0);
        o=[...new Set(o)];let at=0;while(o.length<4&&at<30){const c=Math.max(1,a+Math.floor(Math.random()*21)-10);if(!o.includes(c))o.push(c);at++;}
      } else {
        a=tens; askHL='onluk';
        const wrongTens=[ones,tens+1,tens-1,Math.floor(n/100)].filter(x=>x>0&&x!==a);
        q=`${n} sayısında kaç tane onluk vardır?`;
        o=[a,...wrongTens];
        o=[...new Set(o)].slice(0,4);let at=0;while(o.length<4&&at<30){const c=Math.floor(Math.random()*9)+1;if(!o.includes(c))o.push(c);at++;}
      }
    } else {
      // Seviye 4: Yüzlük+onluk+birlik
      hundreds=Math.floor(Math.random()*4)+1;
      tens=Math.floor(Math.random()*9)+1;
      ones=Math.floor(Math.random()*9)+1;
      n=hundreds*100+tens*10+ones;
      const types=['totalFromVisual','countHundreds','valueHundreds','decomposeAll'];
      const type=types[Math.floor(Math.random()*types.length)];
      if(type==='totalFromVisual'){
        a=n; askHL='toplam'; showNumber=false;
        q=`Bu bloklar toplam kaç eder?`;
        o=[a,a+100,a-100,a+10].filter(x=>x>0);
        o=[...new Set(o)];let at=0;while(o.length<4&&at<30){const c=Math.max(1,a+Math.floor(Math.random()*101)-50);if(!o.includes(c))o.push(c);at++;}
      } else if(type==='countHundreds'){
        a=hundreds; askHL='yüzlük'; showNumber=false;
        q=`Kaç tane yüzlük kare var?`;
        o=[a];let at=0;while(o.length<4&&at<30){const c=Math.floor(Math.random()*5)+1;if(!o.includes(c))o.push(c);at++;}
      } else if(type==='valueHundreds'){
        a=hundreds*100; askHL='yüzlük';
        q=`${n} sayısının yüzlük basamağının değeri kaçtır?`;
        o=[a,hundreds,tens*10,n].filter(x=>x>0);
        o=[...new Set(o)];let at=0;while(o.length<4&&at<30){const c=Math.floor(Math.random()*4+1)*100;if(!o.includes(c))o.push(c);at++;}
      } else {
        a=tens; askHL='onluk';
        q=`${n} sayısının onluk basamağındaki rakam kaçtır?`;
        o=[a,hundreds,ones,a+1].filter(x=>x>=0);
        o=[...new Set(o)];let at=0;while(o.length<4&&at<30){const c=Math.floor(Math.random()*10);if(!o.includes(c))o.push(c);at++;}
      }
    }
    o=o.filter((v,i,ar)=>ar.indexOf(v)===i).slice(0,4);
    while(o.length<4){o.push(o[o.length-1]+1);}
    return{number:n,question:q,answer:a,options:o.sort(()=>Math.random()-0.5),askHL,tens:tens||Math.floor(n/10)%10,ones:ones!==undefined?ones:n%10,hundreds,showNumber};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.answer)setSc(s=>s+20*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Basamak Değeri" emoji="🏛️" description="Onluk çubukları ve birlik küpleri kullanarak basamak değerlerini keşfet!" levels={['Seviye 1 (Onluklar)','Seviye 2 (Birlikler)','Seviye 3 (Birleştir)','Seviye 4 (Yüzlükler)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Basamak Değeri" emoji="🏛️" level={lv} instruction="Onluk çubuklar ve birlik küpler gösterilecek. Görselden sayarak veya sayıyı ayrıştırarak doğru cevabı bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  const hl = p?.askHL;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Basamak Değeri" colors={colors}/>
      {/* Görsel temsil */}
      <div className="bg-white rounded-2xl shadow-xl p-3 mb-2 w-full max-w-sm">
        {p?.showNumber && <div className="text-center text-3xl font-bold mb-2" style={{color:numColor(p?.number,p?.number>99?999:99)}}>{p?.number}</div>}
        <div className="flex items-end justify-center gap-4 min-h-[64px]">
          {p?.hundreds > 0 && <div className="text-center">
            <HundredSquare count={p?.hundreds} highlight={hl==='yüzlük'}/>
            {ua!==null && <div className="text-[10px] text-red-600 font-bold mt-1">{p?.hundreds} yüzlük</div>}
          </div>}
          {p?.tens > 0 && <div className="text-center">
            <TenBar count={p?.tens} highlight={hl==='onluk'}/>
            {ua!==null && <div className="text-[10px] text-blue-600 font-bold mt-1">{p?.tens} onluk</div>}
          </div>}
          {p?.ones > 0 && <div className="text-center">
            <UnitCubes count={p?.ones} highlight={hl==='birlik'}/>
            {ua!==null && <div className="text-[10px] text-amber-600 font-bold mt-1">{p?.ones} birlik</div>}
          </div>}
        </div>
      </div>
      {/* Soru */}
      <div className="bg-white px-4 py-2 rounded-xl shadow mb-2 text-center"><div className="text-sm text-gray-700 font-medium">{p?.question}</div></div>
      {/* Cevap / Seçenekler */}
      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()} Cevap: ${p?.answer}`}</div><div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700 mt-2">💡 {p?.hundreds>0?`${p?.hundreds} yüzlük (${p?.hundreds*100}) + `:''}{p?.tens} onluk ({p?.tens*10}) + {p?.ones} birlik ({p?.ones}) = {p?.number}</div></div>):(<div className="grid grid-cols-2 gap-3">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

const SayiKarsilastirma = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const nw=['','bir','iki','üç','dört','beş','altı','yedi','sekiz','dokuz','on'];

  // Çoklu temsil render
  const renderRep=(val,type,size='text-5xl')=>{
    if(type==='number') return <span className={`font-bold text-indigo-700 ${size}`}>{val}</span>;
    if(type==='word') return <span className="font-bold text-indigo-700 text-2xl capitalize">{nw[val]||val}</span>;
    if(type==='dots') return <div className="flex flex-wrap justify-center gap-1.5" style={{maxWidth:100}}>{Array.from({length:val},(_,i)=><div key={i} className="w-5 h-5 bg-indigo-500 rounded-full"/>)}</div>;
    if(type==='tally'){
      const groups=Math.floor(val/5), rem=val%5;
      return <div className="flex gap-2 items-end">{Array.from({length:groups},(_,i)=><span key={i} className="text-3xl font-bold text-indigo-700">卌</span>)}{rem>0&&<span className="text-2xl text-indigo-700 font-bold">{'|'.repeat(rem)}</span>}</div>;
    }
    if(type==='fingers'){
      const h1=Math.min(val,5), h2=Math.max(0,val-5);
      return <div className="flex gap-1">{h1>0&&<span className="text-4xl">{'🖐️'.repeat(h1===5?1:0)}{h1<5?['','☝️','✌️','🤟','🖖'][h1]:''}</span>}{h2>0&&<span className="text-4xl">{h2===5?'🖐️':['','☝️','✌️','🤟','🖖'][h2]}</span>}</div>;
    }
    return <span className={`font-bold ${size}`}>{val}</span>;
  };

  const gen=(l)=>{
    const ranges={1:{max:10,cnt:2},2:{max:10,cnt:2},3:{max:100,cnt:2},4:{max:100,cnt:3}};
    const c=ranges[l];
    const nums=[];let at=0;
    while(nums.length<c.cnt&&at<50){const n=Math.floor(Math.random()*(c.max-1))+1;if(!nums.includes(n))nums.push(n);at++;}

    // Soru tipi belirle
    const types = l===1 ? ['normal','stroop'] : l===2 ? ['stroop','rep'] : l===3 ? ['stroop','rep','mixed'] : ['stroop','rep','mixed'];
    const type = types[Math.floor(Math.random()*types.length)];

    // Stroop: Fiziksel boyut uyumsuzluğu
    let sizes, repType='number', isCongruent=true;
    if(type==='stroop' || type==='mixed'){
      const sorted=[...nums].sort((a,b)=>b-a); // büyükten küçüğe
      isCongruent = Math.random()>0.5;
      if(isCongruent){
        // Uyumlu: büyük sayı → büyük font
        sizes = nums.map(n => n===sorted[0] ? 'text-6xl' : (n===sorted[sorted.length-1] ? 'text-2xl' : 'text-4xl'));
      } else {
        // Uyumsuz (Stroop): küçük sayı → büyük font
        sizes = nums.map(n => n===sorted[sorted.length-1] ? 'text-6xl' : (n===sorted[0] ? 'text-2xl' : 'text-4xl'));
      }
      repType = type==='mixed' ? ['number','dots','word'][Math.floor(Math.random()*3)] : 'number';
    } else if(type==='rep'){
      // Çoklu temsil
      const repTypes = c.max<=10 ? ['dots','word','tally','fingers'] : ['dots','tally'];
      repType = repTypes[Math.floor(Math.random()*repTypes.length)];
      sizes = nums.map(()=>'text-4xl');
    } else {
      sizes = nums.map(()=>'text-4xl');
    }

    const answer = Math.max(...nums);
    const question = nums.length>=3 ? 'Hangisi en çok?' : 'Hangisi daha çok?';
    const hint = nums.length===2 ? `${Math.min(...nums)} < ${Math.max(...nums)}` : [...nums].sort((a,b)=>a-b).join(' < ');

    return{nums,answer,question,hint,type,sizes,repType,isCongruent};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.answer)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Büyük-Küçük" emoji="⚖️" description="Hangisi daha çok? Boyutuna aldanma, sayısal değere odaklan!" levels={['Seviye 1 (0-10, Stroop)','Seviye 2 (0-10, çoklu temsil)','Seviye 3 (0-100, karışık)','Seviye 4 (0-100, 3 sayı)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Büyük-Küçük" emoji="⚖️" level={lv} instruction="Sayılar farklı boyutlarda veya farklı temsillerle gösterilecek. Fiziksel boyutuna aldanma, değeri büyük olanı seç!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Büyük-Küçük" colors={colors}/>
      <div className="bg-white px-5 py-3 rounded-xl shadow mb-3 text-center">
        <span className="text-xl font-bold text-gray-700">🔼 {p?.question}</span>
        {(p?.type==='stroop'||p?.type==='mixed')&&!p?.isCongruent&&ua===null&&<div className="text-xs text-purple-500 mt-1">💡 Boyutuna aldanma!</div>}
      </div>
      <div className="flex items-center gap-5 mb-4">
        {p?.nums?.map((n,i)=>(
          <button key={i} onClick={()=>!ua&&handle(n)} disabled={ua!==null}
            className={`rounded-2xl flex items-center justify-center shadow-xl border-4 transition-all p-5 min-w-[110px] min-h-[110px] ${
              ua!==null
                ? (n===p?.answer ? 'bg-green-100 border-green-500' : ua===n ? 'bg-red-100 border-red-500' : 'bg-gray-50 border-gray-300')
                : 'bg-white border-blue-300 hover:scale-105 hover:border-blue-500'
            }`}>
            {renderRep(n, p?.repType, p?.sizes?.[i])}
          </button>
        ))}
      </div>
      {ua!==null&&<div className="text-center">
        <div className={`text-2xl font-bold ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()} Cevap: ${p?.answer}`}</div>
        <div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700 mt-2">
          💡 {p?.hint}
          {p?.type==='stroop'&&!p?.isCongruent&&' (Boyut yanıltıcıydı!)'}
        </div>
      </div>}
    </div>
  );
};

const CokluGosterim = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const nw=['','bir','iki','üç','dört','beş','altı','yedi','sekiz','dokuz','on','on bir','on iki','on üç','on dört','on beş','on altı','on yedi','on sekiz','on dokuz','yirmi'];
  const cfg={1:{max:5},2:{max:10},3:{max:15},4:{max:20}};

  const renderRep=(val,type,lg=false)=>{
    const sz=lg?'text-4xl':'text-2xl';
    if(type==='number') return <span className={`font-bold text-indigo-700 ${sz}`}>{val}</span>;
    if(type==='word') return <span className={`font-bold text-indigo-700 capitalize ${lg?'text-2xl':'text-lg'}`}>{nw[val]||String(val)}</span>;
    if(type==='dots') return <div className="flex flex-wrap justify-center gap-1.5" style={{maxWidth:lg?110:90}}>{Array.from({length:Math.min(val,20)},(_,i)=><div key={i} className={`${lg?'w-5 h-5':'w-4 h-4'} bg-indigo-500 rounded-full`}/>)}</div>;
    if(type==='tally'){
      const groups=Math.floor(val/5), rem=val%5;
      return <div className="flex gap-1.5 items-end flex-wrap justify-center">{Array.from({length:groups},(_,i)=><span key={i} className={`${lg?'text-2xl':'text-xl'} font-bold text-indigo-700`}>卌</span>)}{rem>0&&<span className={`${lg?'text-xl':'text-lg'} text-indigo-700 font-bold`}>{'|'.repeat(rem)}</span>}</div>;
    }
    if(type==='tenFrame'){
      const full=Math.min(val,10), second=val>10?val-10:0;
      return <div className="flex gap-1 flex-col items-center">
        <div className="inline-grid grid-cols-5 gap-1 border-2 border-indigo-400 p-1 rounded">{Array.from({length:10},(_,i)=><div key={i} className={`${lg?'w-5 h-5':'w-4 h-4'} rounded-sm ${i<full?'bg-indigo-500':'bg-gray-200'}`}/>)}</div>
        {second>0&&<div className="inline-grid grid-cols-5 gap-1 border-2 border-indigo-400 p-1 rounded">{Array.from({length:10},(_,i)=><div key={i} className={`${lg?'w-5 h-5':'w-4 h-4'} rounded-sm ${i<second?'bg-indigo-500':'bg-gray-200'}`}/>)}</div>}
      </div>;
    }
    if(type==='fingers'){
      const fEmoji=(c)=>['','☝️','✌️','🤟','🖖','🖐️'][c]||'';
      const h1=Math.min(val,5),h2=val>5?Math.min(val-5,5):0;
      return <div className="flex gap-1">{h1>0&&<span className={lg?'text-4xl':'text-3xl'}>{fEmoji(h1)}</span>}{h2>0&&<span className={lg?'text-4xl':'text-3xl'}>{fEmoji(h2)}</span>}</div>;
    }
    if(type==='objects'){
      const emojis=['⭐','🌸','🍎','🐟','🦋'];
      const e=emojis[val%emojis.length];
      return <div className="flex flex-wrap justify-center gap-0.5" style={{maxWidth:lg?120:100}}>{Array.from({length:Math.min(val,20)},(_,i)=><span key={i} className={lg?'text-xl':'text-base'}>{e}</span>)}</div>;
    }
    return <span className={`font-bold ${sz}`}>{val}</span>;
  };

  const gen=(l)=>{
    const mx=cfg[l].max;
    const t=Math.floor(Math.random()*mx)+1;

    // Temsil havuzu
    const allReps = t<=10 ? ['number','dots','word','tally','tenFrame','fingers','objects'] : ['number','dots','word','tally','tenFrame','objects'];

    // Soru tipi çeşitlendirme
    const types = l<=2 ? ['match','identify'] : ['match','identify','oddOneOut'];
    const type = types[Math.floor(Math.random()*types.length)];

    if(type==='oddOneOut'){
      // 4 seçenekten 3ü aynı sayı (farklı temsil), 1i farklı sayı
      const qt = allReps[Math.floor(Math.random()*allReps.length)];
      let wrongVal;do{wrongVal=Math.floor(Math.random()*mx)+1;}while(wrongVal===t);
      const wrongPos = Math.floor(Math.random()*4);
      const repsPool = allReps.filter(r=>r!==qt);
      const opts = Array.from({length:4},(_,i)=>{
        if(i===wrongPos) return {val:wrongVal,rep:repsPool[Math.floor(Math.random()*repsPool.length)]};
        return {val:t,rep:repsPool[i%repsPool.length]};
      });
      return{target:t,type:'oddOneOut',qRep:qt,question:'Diğerlerinden farklı olanı bul!',answer:wrongPos,opts};
    }

    // Normal eşleştirme
    const qt = allReps[Math.floor(Math.random()*allReps.length)];
    const ansReps = allReps.filter(r=>r!==qt);
    const at2 = ansReps[Math.floor(Math.random()*ansReps.length)];
    const o=[t];let at=0;
    while(o.length<4&&at<50){const c=Math.floor(Math.random()*mx)+1;if(!o.includes(c))o.push(c);at++;}
    while(o.length<4)o.push(o.length+mx);
    const question = type==='identify' ? 'Bu kaçtır?' : 'Aynı değeri bul:';
    const aRep2 = type==='identify' ? 'number' : at2;
    return{target:t,type,qRep:qt,aRep:aRep2,question,options:o.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{
    if(p?.type==='oddOneOut'){
      setUa(a);if(a===p?.answer)setSc(s=>s+20*lv);
    } else {
      setUa(a);if(a===p?.target)setSc(s=>s+20*lv);
    }
    setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1200);
  };
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Çoklu Gösterim" emoji="🔮" description="Aynı sayının farklı yüzlerini keşfet: rakam, sözcük, parmak, çetele, onluk çerçeve!" levels={['Seviye 1 (1-5)','Seviye 2 (1-10)','Seviye 3 (1-15)','Seviye 4 (1-20)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Çoklu Gösterim" emoji="🔮" level={lv} instruction="Bir sayı çeşitli biçimlerde gösterilecek. Aynı değerin farklı temsilini bul veya farklı olanı ayırt et!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  if(p?.type==='oddOneOut'){
    return (
      <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
        <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Çoklu Gösterim" colors={colors}/>
        <div className="bg-white p-4 rounded-xl shadow-xl mb-2 min-w-[160px] min-h-[90px] flex items-center justify-center">
          {renderRep(p?.target, p?.qRep, true)}
        </div>
        <div className="text-gray-600 mb-2 text-sm font-medium">{p?.question}</div>
        {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()}`}</div></div>):(<div className="grid grid-cols-2 gap-4">{p?.opts?.map((o,i)=>(<button key={i} onClick={()=>handle(i)} className="p-4 bg-white border-2 border-gray-300 rounded-2xl min-h-[100px] flex items-center justify-center shadow hover:border-indigo-400 transition-all">
          {renderRep(o.val, o.rep)}
        </button>))}</div>)}
      </div>
    );
  }

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Çoklu Gösterim" colors={colors}/>
      <div className="bg-white p-4 rounded-xl shadow-xl mb-2 min-w-[160px] min-h-[90px] flex items-center justify-center">{renderRep(p?.target,p?.qRep,true)}</div>
      <div className="text-gray-600 mb-2 text-sm">{p?.question}</div>
      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold ${ua===p?.target?'text-green-500':'text-orange-500'}`}>{ua===p?.target?'✓ Doğru!':`${encourage()} Cevap: ${p?.target}`}</div></div>):(<div className="grid grid-cols-2 gap-4">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className="p-4 bg-white border-2 border-gray-300 rounded-2xl min-w-[150px] min-h-[100px] flex items-center justify-center shadow hover:border-indigo-400 transition-all">{renderRep(o, p?.aRep)}</button>))}</div>)}
    </div>
  );
};

// ==================== D1: ŞEKLİ TANIMA (Düzey 1) ====================
// SVG anahat şekiller - içi boyanmamış, kalın çizgiler
const SHAPE_COLORS_STROKE = ['#EF4444','#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899','#F97316','#06B6D4'];

const SVGShape = ({type, size=50, color='#3B82F6', rotation=0, scaleX=1, scaleY=1}) => {
  const sw = 3;
  const s = size;
  const cx = s/2, cy = s/2, r = s/2 - 4;
  const style = {transform:`rotate(${rotation}deg) scaleX(${scaleX}) scaleY(${scaleY})`,transformOrigin:'center'};
  
  if (type === 'cember') return <svg width={s} height={s} style={{overflow:'visible'}}><g style={style}><circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}/></g></svg>;
  if (type === 'kare') {const m=sw+2;return <svg width={s} height={s} style={{overflow:'visible'}}><g style={style}><rect x={m} y={m} width={s-m*2} height={s-m*2} fill="none" stroke={color} strokeWidth={sw}/></g></svg>;}
  if (type === 'ucgen') {const pts=`${s/2},${sw+2} ${s-sw-2},${s-sw-2} ${sw+2},${s-sw-2}`;return <svg width={s} height={s} style={{overflow:'visible'}}><g style={style}><polygon points={pts} fill="none" stroke={color} strokeWidth={sw}/></g></svg>;}
  if (type === 'dikdortgen') {const m=sw+2;const w=s*1.5;const h=s;return <svg width={w} height={h} style={{overflow:'visible'}}><g style={{...style,transformOrigin:`${w/2}px ${h/2}px`}}><rect x={m} y={m} width={w-m*2} height={h-m*2} fill="none" stroke={color} strokeWidth={sw}/></g></svg>;}
  return null;
};

const SekilTanima = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [targetType,setTargetType]=useState(null);const [shapes,setShapes]=useState([]);const [found,setFound]=useState([]);
  const [wrong,setWrong]=useState([]);const [rotatingId,setRotatingId]=useState(null);const [extraRot,setExtraRot]=useState({});

  const shapeTypes = ['cember','kare','ucgen','dikdortgen'];
  const shapeNames = {cember:'Çember',kare:'Kare',ucgen:'Üçgen',dikdortgen:'Dikdörtgen'};

  // Dikdörtgen seçildiğinde kare de dikdörtgendir (kavramsal doğruluk)
  const isMatchingType = (shapeType, targetT) => {
    if(targetT === 'dikdortgen') return shapeType === 'dikdortgen' || shapeType === 'kare';
    return shapeType === targetT;
  };

  const getLevelConfig = (l) => {
    return {
      1: { sizeVar: false, rotVar: false, atypical: false, diagRot: false },
      2: { sizeVar: true, rotVar: false, atypical: false, diagRot: false },
      3: { sizeVar: true, rotVar: true, atypical: false, diagRot: true },
      4: { sizeVar: true, rotVar: true, atypical: true, diagRot: true },
      5: { sizeVar: true, rotVar: true, atypical: true, diagRot: true }
    }[l];
  };

  const genRound = (l) => {
    const cfg = getLevelConfig(l);
    const target = shapeTypes[Math.floor(Math.random()*shapeTypes.length)];
    setTargetType(target);
    setFound([]);
    setWrong([]);
    
    const allShapes = [];
    const targetCount = Math.floor(Math.random()*3)+2;
    const sizes = cfg.sizeVar ? [35,50,65] : [50];
    const rots = cfg.rotVar ? (cfg.diagRot ? [0,30,45,60,90,120,135,150,180,210,225,270,315] : [0,90,180,270]) : [0];
    
    // Hedef şekiller
    for(let i=0;i<targetCount;i++){
      const sz = sizes[Math.floor(Math.random()*sizes.length)];
      const rot = rots[Math.floor(Math.random()*rots.length)];
      const col = SHAPE_COLORS_STROKE[Math.floor(Math.random()*SHAPE_COLORS_STROKE.length)];
      let sx=1, sy=1;
      if(cfg.atypical && Math.random()>0.5){
        if(target==='dikdortgen'){sx=Math.random()>0.5?0.5:1.5;}
        else if(target==='ucgen'){sy=Math.random()>0.5?0.6:1.4;}
      }
      allShapes.push({type:target,size:sz,rot,color:col,sx,sy,isTarget:true});
    }

    // Dikdörtgen hedefse, 1-2 kare de ekle (bunlar da hedef sayılacak)
    if(target === 'dikdortgen'){
      const extraSquares = Math.floor(Math.random()*2)+1;
      for(let i=0;i<extraSquares;i++){
        const sz = sizes[Math.floor(Math.random()*sizes.length)];
        const rot = rots[Math.floor(Math.random()*rots.length)];
        const col = SHAPE_COLORS_STROKE[Math.floor(Math.random()*SHAPE_COLORS_STROKE.length)];
        allShapes.push({type:'kare',size:sz,rot,color:col,sx:1,sy:1,isTarget:true});
      }
    }
    
    // Diğer şekiller (dikdörtgen hedefse kare distraktör olarak eklenmez)
    const totalTarget = allShapes.length;
    const otherCount = Math.max(6, 8+l*2-totalTarget);
    const otherTypes = target === 'dikdortgen' 
      ? shapeTypes.filter(t=>t!=='dikdortgen' && t!=='kare')
      : shapeTypes.filter(t=>t!==target);
    for(let i=0;i<otherCount;i++){
      const t = otherTypes[Math.floor(Math.random()*otherTypes.length)];
      const sz = sizes[Math.floor(Math.random()*sizes.length)];
      const rot = rots[Math.floor(Math.random()*rots.length)];
      const col = SHAPE_COLORS_STROKE[Math.floor(Math.random()*SHAPE_COLORS_STROKE.length)];
      allShapes.push({type:t,size:sz,rot,color:col,sx:1,sy:1,isTarget:false});
    }
    
    setShapes(allShapes.sort(()=>Math.random()-0.5).map((s,i)=>({...s,id:i})));
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);genRound(l);setGs('playing');};

  const handleClick=(shape)=>{
    // DGS: Bulunan şekle dokunarak döndür (keşif modu)
    if(found.includes(shape.id)){
      setExtraRot(prev=>({...prev,[shape.id]:((prev[shape.id]||0)+45)%360}));
      return;
    }
    if(wrong.includes(shape.id))return;
    if(shape.isTarget){
      const nf=[...found,shape.id];setFound(nf);setSc(s=>s+10*lv);
      if(nf.length===shapes.filter(s=>s.isTarget).length){
        setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);genRound(lv);}else setGs('results');},800);
      }
    } else {
      // Yanlış tıklama: kırmızı flash + ipucu
      setWrong(w=>[...w,shape.id]);
      setTimeout(()=>setWrong(w=>w.filter(x=>x!==shape.id)),1200);
    }
  };

  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Şekli Tanıma" emoji="🔍" description="İstenen şekli bul ve dokun! Renk, boyut veya döndürme değişse de şekli tanı." levels={['Düzey 1a (Temel şekiller)','Düzey 1b (Farklı boyutlar)','Düzey 1c (Eğik/döndürülmüş)','Düzey 1d (Orantısız şekiller)','Düzey 1e (Tam zorluk)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Şekli Tanıma" emoji="🔍" level={lv} instruction="Çeşitli şekiller gösterilecek. İstenen geometrik şekli bul ve üzerine dokun! Renk veya boyut farklı olabilir." colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={5} onNextLevel={startG} prevBest={prevBest}/>;

  const tc = shapes.filter(s=>s.isTarget).length;

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Şekli Tanıma" colors={colors}/>
      <div className="bg-white px-4 py-2 rounded-xl shadow mb-2 text-center"><span className="text-sm text-gray-500">Düzey 1: Görselleştirme — {['Temel','Boyut','Konumlanış','Karışık','Tam'][lv-1]}</span></div>
      
      {/* Hedef şekil gösterimi */}
      <div className="bg-white px-6 py-3 rounded-xl shadow mb-3 flex items-center gap-3">
        <span className="text-gray-600">Bul:</span>
        <SVGShape type={targetType} size={40} color="#374151"/>
        <span className="font-bold text-lg">{shapeNames[targetType]}</span>
        {targetType==='dikdortgen' && <span className="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">Kare de sayılır!</span>}
        <span className="ml-2 bg-green-100 px-3 py-1 rounded-full text-green-700 text-sm">{found.length}/{tc}</span>
      </div>
      <div className="text-xs text-gray-600 mb-2">💡 {targetType==='dikdortgen' ? 'Her kare aynı zamanda bir dikdörtgendir!' : targetType==='kare' && lv>=3 ? 'Eğik duran kare hâlâ karedir! Özelliklerine odaklan: 4 eşit kenar, 4 dik açı.' : targetType==='ucgen' && lv>=3 ? 'Üçgen ters dursa da üçgendir! 3 kenar ve 3 açısı var mı?' : 'Renk, boyut veya döndürme değişse de şekli tanı! Yeşil şekle dokunarak döndürebilirsin.'}</div>
      
      {/* Şekil ızgarası */}
      <div className="grid grid-cols-4 gap-3 bg-white p-4 rounded-2xl shadow-xl">
        {shapes.map(s=>(
          <button key={s.id} onClick={()=>handleClick(s)} className={`w-20 h-20 flex items-center justify-center rounded-xl transition-all border-2 ${
            found.includes(s.id) ? 'bg-green-100 scale-90 border-green-400 cursor-pointer' :
            wrong.includes(s.id) ? 'bg-red-100 border-red-400 animate-pulse' :
            'bg-gray-50 hover:bg-gray-100 border-gray-200'}`}>
            <SVGShape type={s.type} size={s.size} color={s.color} rotation={(s.rot||0)+(extraRot[s.id]||0)} scaleX={s.sx} scaleY={s.sy}/>
          </button>
        ))}
      </div>
    </div>
  );
};

// ==================== D2: ELEMAN VE ÖZELLİKLER (Düzey 2) ====================
const ElemanVeOzellikler = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);const [used,setUsed]=useState([]);

  // SVG çokgen
  const Poly = ({sides,size=80,color='#6366f1'}) => {
    if(sides===0) return <svg width={size} height={size} style={{overflow:'visible'}}><circle cx={size/2} cy={size/2} r={size/2-5} fill="none" stroke={color} strokeWidth={3}/></svg>;
    const pts = Array.from({length:sides},(_,i)=>{const a=(i*2*Math.PI/sides)-Math.PI/2;return `${size/2+(size/2-5)*Math.cos(a)},${size/2+(size/2-5)*Math.sin(a)}`;}).join(' ');
    return <svg width={size} height={size} style={{overflow:'visible'}}><polygon points={pts} fill="none" stroke={color} strokeWidth={3}/></svg>;
  };

  // Eşkenar dörtgen SVG
  const Rhombus = ({size=80,color='#6366f1'}) => {
    const s=size,m=5;
    const pts=`${s/2},${m} ${s-m},${s/2} ${s/2},${s-m} ${m},${s/2}`;
    return <svg width={s} height={s} style={{overflow:'visible'}}><polygon points={pts} fill="none" stroke={color} strokeWidth={3}/></svg>;
  };

  const shapeData = {
    cember: {name:'Çember',sides:0,corners:0,render:(s,c)=><Poly sides={0} size={s} color={c}/>},
    ucgen: {name:'Üçgen',sides:3,corners:3,render:(s,c)=><Poly sides={3} size={s} color={c}/>},
    kare: {name:'Kare',sides:4,corners:4,render:(s,c)=><Poly sides={4} size={s} color={c}/>},
    dikdortgen: {name:'Dikdörtgen',sides:4,corners:4,render:(s,c)=>{const w=s*1.4,sw=3,m=sw+2;return <svg width={w} height={s} style={{overflow:'visible'}}><rect x={m} y={m} width={w-m*2} height={s-m*2} fill="none" stroke={c} strokeWidth={sw}/></svg>;}},
    eskenar_dortgen: {name:'Eşkenar Dörtgen',sides:4,corners:4,render:(s,c)=><Rhombus size={s} color={c}/>},
    besgen: {name:'Beşgen',sides:5,corners:5,render:(s,c)=><Poly sides={5} size={s} color={c}/>},
    altigen: {name:'Altıgen',sides:6,corners:6,render:(s,c)=><Poly sides={6} size={s} color={c}/>},
    sekizgen: {name:'Sekizgen',sides:8,corners:8,render:(s,c)=><Poly sides={8} size={s} color={c}/>},
  };

  const allQuestions = [
    // 2a: Temel - şekil verip eleman sorma
    {id:1,shape:'ucgen',type:'edges',q:'Üçgenin kaç kenarı var?',a:3,explain:'Üçgenin 3 kenarı vardır.',lv:1},
    {id:2,shape:'kare',type:'edges',q:'Karenin kaç kenarı var?',a:4,explain:'Karenin 4 eşit kenarı vardır.',lv:1},
    {id:3,shape:'dikdortgen',type:'edges',q:'Dikdörtgenin kaç kenarı var?',a:4,explain:'Dikdörtgenin 4 kenarı vardır.',lv:1},
    {id:4,shape:'ucgen',type:'corners',q:'Üçgenin kaç köşesi var?',a:3,explain:'Üçgenin 3 köşesi vardır.',lv:1},
    {id:5,shape:'kare',type:'corners',q:'Karenin kaç köşesi var?',a:4,explain:'Karenin 4 köşesi vardır.',lv:1},
    {id:6,shape:'dikdortgen',type:'corners',q:'Dikdörtgenin kaç köşesi var?',a:4,explain:'Dikdörtgenin 4 köşesi vardır.',lv:1},
    {id:7,shape:'eskenar_dortgen',type:'edges',q:'Eşkenar dörtgenin kaç kenarı var?',a:4,explain:'Eşkenar dörtgenin 4 eşit kenarı vardır.',lv:1},
    {id:8,shape:'cember',type:'edges',q:'Çemberin kaç kenarı var?',a:0,explain:'Çemberin düz kenarı yoktur!',lv:1},
    // 2b: Orta
    {id:11,shape:'besgen',type:'edges',q:'Beşgenin kaç kenarı var?',a:5,explain:'Beşgenin 5 kenarı vardır.',lv:2},
    {id:12,shape:'altigen',type:'edges',q:'Altıgenin kaç kenarı var?',a:6,explain:'Altıgenin 6 kenarı vardır.',lv:2},
    {id:13,shape:'sekizgen',type:'edges',q:'Sekizgenin kaç kenarı var?',a:8,explain:'Sekizgenin 8 kenarı vardır.',lv:2},
    {id:14,shape:'besgen',type:'corners',q:'Beşgenin kaç köşesi var?',a:5,explain:'Beşgenin 5 köşesi vardır.',lv:2},
    {id:15,shape:'altigen',type:'corners',q:'Altıgenin kaç köşesi var?',a:6,explain:'Altıgenin 6 köşesi vardır.',lv:2},
    // 2c: Tanımlama
    {id:21,shape:null,type:'identify',q:'3 kenarı ve 3 köşesi olan şekil hangisi?',a:'Üçgen',opts:['Üçgen','Kare','Dikdörtgen','Beşgen'],explain:'3 kenarlı şekle üçgen denir.',lv:3},
    {id:22,shape:null,type:'identify',q:'4 eşit kenarı ve 4 dik açısı olan şekil?',a:'Kare',opts:['Üçgen','Kare','Dikdörtgen','Beşgen'],explain:'Kare: 4 eşit kenar + 4 dik açı.',lv:3},
    {id:23,shape:null,type:'identify',q:'Karşılıklı kenarları eşit, 4 dik açılı şekil?',a:'Dikdörtgen',opts:['Üçgen','Kare','Dikdörtgen','Altıgen'],explain:'Dikdörtgende karşılıklı kenarlar eşittir.',lv:3},
    {id:24,shape:null,type:'identify',q:'4 eşit kenarı olan ama açıları dik olmayan şekil?',a:'Eşkenar Dörtgen',opts:['Kare','Eşkenar Dörtgen','Dikdörtgen','Üçgen'],explain:'Eşkenar dörtgenin kenarları eşit, açıları dik değildir.',lv:3},
    // 2d: Özellik
    {id:31,shape:'kare',type:'property',q:'Karenin tüm kenarları eşit mi?',a:'Evet',explain:'Evet! Karenin 4 kenarı da eşit uzunluktadır.',lv:4},
    {id:32,shape:'dikdortgen',type:'property',q:'Dikdörtgenin tüm kenarları eşit mi?',a:'Hayır',explain:'Hayır! Sadece karşılıklı kenarlar eşittir.',lv:4},
    {id:33,shape:'cember',type:'property',q:'Çemberin köşesi var mı?',a:'Hayır',explain:'Hayır! Çember yuvarlak olduğu için köşesi yoktur.',lv:4},
    {id:34,shape:'kare',type:'property',q:'Karenin tüm açıları eşit mi?',a:'Evet',explain:'Evet! 4 açısı da 90 derecedir.',lv:4},
    {id:35,shape:'eskenar_dortgen',type:'property',q:'Eşkenar dörtgenin açıları dik mi?',a:'Hayır',explain:'Hayır! Eşkenar dörtgenin açıları genelde dik değildir.',lv:4},
  ];

  const genOpts = (q) => {
    if(q.type==='identify') return q.opts;
    if(q.type==='property') return ['Evet','Hayır'];
    const o=[q.a];let at=0;while(o.length<4&&at<40){const c=Math.floor(Math.random()*10);if(!o.includes(c))o.push(c);at++;}while(o.length<4)o.push(o.length+10);return o.sort(()=>Math.random()-0.5);
  };

  const gen = (l, u) => {
    const av = allQuestions.filter(q=>q.lv<=l&&!u.includes(q.id));
    const pool = av.length>0 ? av : allQuestions.filter(q=>q.lv<=l);
    const q = pool[Math.floor(Math.random()*pool.length)];
    return {...q, options: genOpts(q)};
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG = (l) => {setLv(l);setSc(0);setRd(1);setUsed([]);const q=gen(l,[]);setP(q);setUsed([q.id]);setUa(null);setGs('playing');};

  const handle = (a) => {
    const correct = a === p?.a;
    setUa(a);if(correct)setSc(s=>s+15*lv);
    setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);const q=gen(lv,used);setP(q);setUsed(prev=>[...prev,q.id]);setUa(null);}else setGs('results');},2000);

  if(gs==='ready') return <ReadyScreen title="Eleman ve Özellikler" emoji="🔎" level={lv} instruction="Bir şekil gösterilecek ve kenar, köşe veya açı sayısı sorulacak. Doğru cevabı bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  const sd = p?.shape ? shapeData[p?.shape] : null;

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Eleman ve Özellikler" colors={colors}/>

      <div className="bg-white px-6 py-3 rounded-2xl shadow-xl mb-3 text-center">
        {sd && <div className="flex justify-center mb-3">{sd.render(80,'#6366f1')}</div>}

    </div>
  );
};

// ==================== D3: İLİŞKİLER VE ÇIKARIM (Düzey 3) ====================
const IliskilerVeCikarim = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [p,setP]=useState(null);const [selected,setSelected]=useState([]);const [sub,setSub]=useState(false);const [used,setUsed]=useState([]);

  // Her soru: koşullu ifade + seçenekler (birden fazla doğru olabilir)
  const questions = [
    // Düzey 1 — 6 soru

  };

    setSub(true);

      </div>
      
      <div className="space-y-2 w-full max-w-sm mb-3">
        {p?.opts?.map((o,i) => {
          let btnClass = 'bg-white border-2 border-gray-300 text-gray-700';

            else if(o.correct) btnClass = 'bg-green-50 border-2 border-green-300 text-green-600';
            else if(selected.includes(i)) btnClass = 'bg-red-100 border-2 border-red-500 text-red-700';
          } else if(selected.includes(i)){
            btnClass = 'bg-emerald-100 border-2 border-emerald-500 text-emerald-700';
          }
          return (
            <button key={i} onClick={()=>toggleOpt(i)} className={`w-full px-4 py-3 rounded-xl font-medium text-left transition-all ${btnClass}`}>
              <span className="mr-2">{sub ? (o.correct ? '✓' : '○') : (selected.includes(i) ? '☑' : '☐')}</span>
              {o.text}
            </button>
          );
        })}
      </div>
      
      {!sub && selected.length > 0 && (
        <button onClick={handleSub} className={`px-10 py-4 ${colors?.button} text-white rounded-xl font-bold text-lg shadow-lg`}>Kontrol Et</button>
      )}

          💡 {p?.explain}
        </div>

// ==================== D4: YÖN VE MESAFE ====================
const YonVeMesafe = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const objs=[{e:'🏠',n:'ev'},{e:'🌳',n:'ağaç'},{e:'🚗',n:'araba'},{e:'⭐',n:'yıldız'},{e:'🎈',n:'balon'},{e:'🐶',n:'köpek'},{e:'🌸',n:'çiçek'},{e:'📚',n:'kitap'},{e:'🐱',n:'kedi'},{e:'🍎',n:'elma'}];
  const lvCfg={1:{dirs:['solunda','sağında'],label:'Yatay (Sol/Sağ)'},2:{dirs:['üstünde','altında'],label:'Dikey (Üst/Alt)'},3:{dirs:['solunda','sağında','üstünde','altında'],label:'Dört Yön Karışık'},4:{dirs:['solunda','sağında','üstünde','altında'],label:'Çoklu Nesne'}};
  const posMap={solunda:3,sağında:5,üstünde:1,altında:7};
  const gen=(l)=>{
    const g=Array(9).fill(null);
    const o1=objs[Math.floor(Math.random()*objs.length)];
    let o2;do{o2=objs[Math.floor(Math.random()*objs.length)];}while(o2.e===o1.e);
    g[4]=o1;
    const dirs=lvCfg[l].dirs;
    const pos=dirs[Math.floor(Math.random()*dirs.length)];
    g[posMap[pos]]=o2;
    // Seviye 4: Ekstra nesne ekle
    if(l===4){
      let o3;do{o3=objs[Math.floor(Math.random()*objs.length)];}while(o3.e===o1.e||o3.e===o2.e);
      const otherPos=dirs.filter(d=>d!==pos);
      const extraPos=otherPos[Math.floor(Math.random()*otherPos.length)];
      g[posMap[extraPos]]=o3;
    }
    return{grid:g,obj1:o1,obj2:o2,position:pos};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.position)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Yön ve Mesafe" emoji="🧭" description="Nesnelerin birbirine göre konumunu bul! Sol, sağ, üst, alt yönlerini öğren." levels={['Seviye 1 (Sol/Sağ)','Seviye 2 (Üst/Alt)','Seviye 3 (4 Yön Karışık)','Seviye 4 (Çoklu Nesne)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Yön ve Mesafe" emoji="🧭" level={lv} instruction="Izgarada iki nesne gösterilecek. Birinin diğerine göre konumunu (sol, sağ, üst, alt) bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  const dirs=lvCfg[lv].dirs;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Yön ve Mesafe" colors={colors}/>
      <div className="bg-white px-3 py-1 rounded-lg shadow mb-2 text-xs text-gray-500">{lvCfg[lv].label}</div>
      <div className="grid grid-cols-3 gap-1 bg-white p-3 rounded-2xl shadow-xl mb-3">{p?.grid.map((c,i)=>(<div key={i} className={`w-20 h-20 rounded-xl flex flex-col items-center justify-center ${i===4?'bg-blue-50 border-2 border-blue-200':'bg-gray-100'}`}>{c&&<><span className="text-3xl">{c.e}</span><span className="text-xs text-gray-500">({c.n})</span></>}</div>))}</div>
      <div className="bg-white px-4 py-3 rounded-xl shadow mb-3 text-center"><span className="text-lg text-gray-700"><span className="font-bold">{p?.obj2?.e} ({p?.obj2?.n})</span>, {p?.obj1?.e} ({p?.obj1?.n})'ın neresinde?</span></div>
      {ua!==null?(<Feedback isCorrect={ua===p?.position} answer={p?.position} hint={ua===p?.position ? `Doğru! ${p?.obj2?.n}, ${p?.obj1?.n}'ın ${p?.position}.` : `${p?.obj2?.n}, ${p?.obj1?.n}'ın ${p?.position}. Izgarada konumlara dikkat et!`}/>):(<div className={`grid ${dirs.length<=2?'grid-cols-2':'grid-cols-2'} gap-3`}>{dirs.map((pos,i)=>(<button key={i} onClick={()=>handle(pos)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-lg shadow-lg hover:scale-105 transition-transform`}>{pos}</button>))}</div>)}
    </div>
  );
};
