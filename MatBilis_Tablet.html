const ParcaButun = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const cfg={1:{max:5},2:{max:10},3:{max:10},4:{max:15}};

  const gen=(l)=>{
    const mx=cfg[l].max;
    const whole=Math.floor(Math.random()*(mx-2))+3;
    const part1=Math.floor(Math.random()*(whole-1))+1;
    const part2=whole-part1;
    const mt=Math.random()<0.33?'whole':(Math.random()<0.5?'part1':'part2');
    const answer=mt==='whole'?whole:mt==='part1'?part1:part2;
    const o=[answer];let at=0;while(o.length<4&&at<40){const c=Math.max(0,answer+Math.floor(Math.random()*6)-3);if(!o.includes(c)&&c>=0)o.push(c);at++;}while(o.length<4)o.push(o.length+answer);
    return{whole,part1,part2,missingType:mt,answer,options:o.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.answer)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};

  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Parça-Bütün" emoji="🧩" description="Üçgenin köşelerindeki sayılar arasındaki ilişkiyi keşfet! Parçaların toplamı bütünü verir." levels={['Seviye 1 (1-5)','Seviye 2 (1-10)','Seviye 3 (1-10 İleri)','Seviye 4 (1-15)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Parça-Bütün" emoji="🧩" level={lv} instruction="Üçgenin tepesinde bütün, alt köşelerinde parçalar var. İki parçanın toplamı bütüne eşittir. Eksik sayıyı bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  const isMissing=(t)=>p?.missingType===t;
  const nodeVal=(val,type)=>{
    const missing = isMissing(type);
    if(missing && ua===null) return <span className="text-2xl font-bold text-purple-400 animate-pulse">?</span>;
    if(missing && ua!==null) return <span className="text-2xl font-bold text-green-600">{val}</span>;
    return <span className="text-2xl font-bold text-gray-800">{val}</span>;
  };

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Parça-Bütün" colors={colors}/>
      
      {/* Üçgen Sayı Bağı */}
      <div className="bg-white rounded-2xl shadow-xl p-4 mb-2 w-full max-w-xs">
        <div className="relative" style={{height:190}}>
          {/* SVG çizgiler */}
          <svg className="absolute inset-0 w-full h-full" viewBox="0 0 240 190">
            <line x1="120" y1="38" x2="40" y2="148" stroke="#C4B5FD" strokeWidth="3" strokeDasharray="6,4"/>
            <line x1="120" y1="38" x2="200" y2="148" stroke="#C4B5FD" strokeWidth="3" strokeDasharray="6,4"/>
          </svg>
          
          {/* Tepedeki düğüm: BÜTÜN */}
          <div className="absolute left-1/2 -translate-x-1/2 top-0 flex flex-col items-center">
            <div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg border-3 ${isMissing('whole')?'bg-purple-100 border-purple-400 ring-2 ring-purple-300':'bg-indigo-100 border-indigo-400'}`}>
              {nodeVal(p?.whole,'whole')}
            </div>
            <span className="text-[10px] font-bold text-indigo-500 mt-0.5">BÜTÜN</span>
          </div>
          
          {/* Sol alt düğüm: PARÇA 1 */}
          <div className="absolute left-0 bottom-0 flex flex-col items-center" style={{left:4}}>
            <div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg border-3 ${isMissing('part1')?'bg-purple-100 border-purple-400 ring-2 ring-purple-300':'bg-rose-100 border-rose-400'}`}>
              {nodeVal(p?.part1,'part1')}
            </div>
            <span className="text-[10px] font-bold text-rose-500 mt-0.5">PARÇA</span>
          </div>
          
          {/* Sağ alt düğüm: PARÇA 2 */}
          <div className="absolute right-0 bottom-0 flex flex-col items-center" style={{right:4}}>
            <div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg border-3 ${isMissing('part2')?'bg-purple-100 border-purple-400 ring-2 ring-purple-300':'bg-sky-100 border-sky-400'}`}>
              {nodeVal(p?.part2,'part2')}
            </div>
            <span className="text-[10px] font-bold text-sky-500 mt-0.5">PARÇA</span>
          </div>
        </div>
      </div>
      
      {/* Soru açıklaması */}
      <div className="bg-white px-4 py-2 rounded-xl shadow mb-2 text-center max-w-xs">
        <div className="text-sm text-gray-700 font-medium">
          {isMissing('whole')?'İki parçanın toplamı (bütün) kaçtır?':isMissing('part1')?`Bütün ${p?.whole}, bir parça ${p?.part2}. Eksik parça kaç?`:`Bütün ${p?.whole}, bir parça ${p?.part1}. Eksik parça kaç?`}
        </div>
      </div>

      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()} Cevap: ${p?.answer}`}</div><div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700">💡 {p?.part1} + {p?.part2} = {p?.whole}</div></div>):(<div className="grid grid-cols-2 gap-3">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

// ==================== E3: TOPLAMA STRATEJİLERİ ====================
const ToplamaStratejileri = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const cfg={1:{maxA:5,maxB:4},2:{maxA:9,maxB:9},3:{maxA:10,maxB:10},4:{maxA:15,maxB:15}};

  const gen=(l)=>{
    const c=cfg[l];
    const a=Math.floor(Math.random()*c.maxA)+1;
    const b=Math.floor(Math.random()*c.maxB)+1;
    const answer=a+b;
    // İşlem tipi seç
    const types=['normal','missing_result','missing_first','missing_second'];
    const type=l<=2?types[Math.floor(Math.random()*2)]:types[Math.floor(Math.random()*types.length)];
    let question,correctAnswer;
    switch(type){
      case'missing_first':question=`? + ${b} = ${answer}`;correctAnswer=a;break;
      case'missing_second':question=`${a} + ? = ${answer}`;correctAnswer=b;break;
      default:question=`${a} + ${b} = ?`;correctAnswer=answer;break;
    }
    const o=[correctAnswer];let at=0;while(o.length<4&&at<40){const v=Math.max(0,correctAnswer+Math.floor(Math.random()*6)-3);if(!o.includes(v)&&v>=0)o.push(v);at++;}while(o.length<4)o.push(o.length+correctAnswer);
    return{a,b,answer,type,question,correctAnswer,options:o.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(ans)=>{setUa(ans);if(ans===p?.correctAnswer)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};

  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Toplama Stratejileri" emoji="➕" description="Toplama işlemini görsel destekle öğren! İleri seviyelerde eksik sayıyı bul." levels={['Seviye 1 (1-5)','Seviye 2 (1-9)','Seviye 3 (1-10 Eksik)','Seviye 4 (1-15 Eksik)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Toplama Stratejileri" emoji="➕" level={lv} instruction="Toplama işlemi gösterilecek. Sonucu bul! İleri seviyelerde eksik olan sayıyı tamamla." colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Toplama Stratejileri" colors={colors}/>
      
      {/* Görsel temsil */}
      <div className="bg-white p-5 rounded-2xl shadow-xl mb-3 flex items-center gap-3">
        <div className="flex flex-wrap gap-1 justify-center" style={{maxWidth:70}}>
          {Array.from({length:p?.a||0},(_,i)=>(<div key={i} className="w-4 h-4 bg-rose-400 rounded-full"/>))}
        </div>
        <span className="text-2xl font-bold text-gray-400">+</span>
        <div className="flex flex-wrap gap-1 justify-center" style={{maxWidth:70}}>
          {Array.from({length:p?.b||0},(_,i)=>(<div key={i} className="w-4 h-4 bg-blue-400 rounded-full"/>))}
        </div>
      </div>
      
      {/* Soru */}
      <div className="bg-white px-8 py-4 rounded-2xl shadow-xl mb-3 border-4 border-purple-200">
        <div className="text-3xl font-bold text-purple-700 text-center">{p?.question}</div>
      </div>

      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.correctAnswer?'text-green-500':'text-orange-500'}`}>{ua===p?.correctAnswer?'✓ Doğru!':`${encourage()} Cevap: ${p?.correctAnswer}`}</div><div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700">💡 {p?.a} + {p?.b} = {p?.answer}</div></div>):(<div className="grid grid-cols-2 gap-3">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

// ==================== E4: BÖLÜŞME ZAMANI ====================
const BolusmeZamani = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const items=[
    {e:'🍎',n:'elma'},{e:'🍊',n:'portakal'},{e:'🍋',n:'limon'},{e:'🍇',n:'üzüm'},{e:'🍓',n:'çilek'},
    {e:'🍌',n:'muz'},{e:'🍪',n:'kurabiye'},{e:'🧁',n:'kek'},{e:'🍬',n:'şeker'},{e:'🎈',n:'balon'},
    {e:'✏️',n:'kalem'},{e:'📚',n:'kitap'},{e:'⚽',n:'top'},{e:'🌸',n:'çiçek'},{e:'🧸',n:'oyuncak'}
  ];
  const kids=['👧','👦','🧒','👶','🧒'];
  const cfg={1:{maxKids:2,maxPer:3},2:{maxKids:3,maxPer:3},3:{maxKids:4,maxPer:4},4:{maxKids:5,maxPer:5}};

  const gen=(l)=>{
    const c=cfg[l];
    const numKids=Math.floor(Math.random()*(c.maxKids-1))+2;
    const perKid=Math.floor(Math.random()*c.maxPer)+1;
    const total=numKids*perKid;
    const item=items[Math.floor(Math.random()*items.length)];
    const kidEmojis=Array.from({length:numKids},(_,i)=>kids[i%kids.length]);

    // Soru tipleri: paylaştırma, toplam hesaplama, gruplama
    const types = l<=2 ? ['share','total'] : ['share','total','groupCount','groupSize'];
    const type = types[Math.floor(Math.random()*types.length)];

    let answer, question, hint;
    if(type==='share'){
      answer=perKid;
      question=`${total} ${item.n} ${numKids} çocuğa eşit paylaştırılırsa her çocuk kaç ${item.n} alır?`;
      hint=`${total} ${item.n} ÷ ${numKids} çocuk = her biri ${perKid} tane`;
    } else if(type==='total'){
      answer=total;
      question=`${numKids} çocuğa ${perKid}'şer ${item.n} verilirse toplam kaç ${item.n} gerekir?`;
      hint=`${numKids} çocuk × ${perKid} tane = toplam ${total} ${item.n}`;
    } else if(type==='groupCount'){
      answer=numKids;
      question=`${total} ${item.n} ${perKid}'${perKid>1?'erli':'li'} gruplara ayrılırsa kaç grup olur?`;
      hint=`${total} ${item.n} ÷ ${perKid}'li gruplar = ${numKids} grup`;
    } else {
      answer=perKid;
      question=`${total} ${item.n} ${numKids} eşit gruba ayrılırsa her grupta kaç ${item.n} olur?`;
      hint=`${total} ${item.n} ÷ ${numKids} grup = her grupta ${perKid} tane`;
    }

    const o=[answer];let at=0;while(o.length<4&&at<40){const v=Math.max(1,answer+Math.floor(Math.random()*6)-3);if(!o.includes(v))o.push(v);at++;}while(o.length<4)o.push(o.length+answer);
    return{numKids,perKid,total,item,kidEmojis,type,answer,question,hint,options:o.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(a)=>{setUa(a);if(a===p?.answer)setSc(s=>s+20*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1500);};

  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Bölüşme Zamanı" emoji="🍎" description="Nesneleri eşit paylaştır veya gruplara ayır!" levels={['Seviye 1 (2 çocuk)','Seviye 2 (2-3 çocuk)','Seviye 3 (2-4, gruplama)','Seviye 4 (2-5, gruplama)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Bölüşme Zamanı" emoji="🍎" level={lv} instruction="Nesneleri çocuklara eşit paylaştır veya gruplara ayır. Doğru sayıyı bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  const isGroupQ = p?.type==='groupCount'||p?.type==='groupSize';
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Bölüşme Zamanı" colors={colors}/>
      
      {/* Görsel: nesneler ve çocuklar/gruplar */}
      <div className="bg-white p-3 rounded-2xl shadow-xl mb-2 text-center w-full max-w-sm">
        <div className="flex flex-wrap justify-center gap-1 mb-2">
          {Array.from({length:Math.min(p?.total||0,20)},(_,i)=>(<span key={i} className="text-2xl">{p?.item?.e}</span>))}
          {(p?.total||0)>20&&<span className="text-gray-500 ml-1">...({p?.total})</span>}
        </div>
        {!isGroupQ ? (
          <div className="flex justify-center gap-3">
            {p?.kidEmojis?.map((k,i)=>(<div key={i} className="flex flex-col items-center"><span className="text-2xl">{k}</span><div className="w-10 h-1 bg-gray-300 rounded mt-1"/></div>))}
          </div>
        ) : (
          <div className="flex justify-center gap-2">
            {Array.from({length:Math.min(p?.numKids||0,6)},(_,i)=>(
              <div key={i} className="border-2 border-dashed border-purple-300 rounded-lg px-2 py-1 bg-purple-50">
                <span className="text-xs text-purple-500">grup {i+1}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Soru */}
      <div className="bg-white px-4 py-2 rounded-xl shadow mb-2 text-center max-w-sm">
        <div className="text-sm text-gray-700 font-medium">{p?.question}</div>
      </div>

      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()} Cevap: ${p?.answer}`}</div><div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700">💡 {p?.hint}</div></div>):(<div className="grid grid-cols-2 gap-3">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

// ==================== E1: KOMŞU SAYILAR ====================
const KomsuSayilar = ({ onBack, colors, onGameComplete, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);const [p,setP]=useState(null);const [ua,setUa]=useState(null);

  const gen=(l)=>{
    const ranges={1:{max:10},2:{max:20},3:{max:50},4:{max:100}};
    const mx=ranges[l].max;
    // Soru tipleri seviyeye göre
    const allTypes = {
      1:['next','prev','between'],
      2:['next','prev','between','twoGap'],
      3:['next','prev','between','twoGap','sequence','backward'],
      4:['next','prev','between','twoGap','sequence','backward','skip2','skip5']
    };
    const types=allTypes[l];
    const type=types[Math.floor(Math.random()*types.length)];

    let answer, slots, question, hint;

    if(type==='next'){
      const n=Math.floor(Math.random()*(mx-1))+1;
      answer=n+1;
      slots=[{v:n-1,show:true},{v:n,show:true},{v:n+1,show:false},{v:n+2,show:true}];
      question=`${n} sayısından hemen sonra hangi sayı gelir?`;
      hint=`...${n}, ${n+1}, ${n+2}...`;
    } else if(type==='prev'){
      const n=Math.floor(Math.random()*(mx-2))+2;
      answer=n-1;
      slots=[{v:n-2,show:true},{v:n-1,show:false},{v:n,show:true},{v:n+1,show:true}];
      question=`${n} sayısından hemen önce hangi sayı gelir?`;
      hint=`...${n-1}, ${n}, ${n+1}...`;
    } else if(type==='between'){
      const n=Math.floor(Math.random()*(mx-2))+2;
      answer=n;
      slots=[{v:n-1,show:true},{v:n,show:false},{v:n+1,show:true}];
      question=`${n-1} ile ${n+1} arasındaki sayı hangisidir?`;
      hint=`${n-1}, ${n}, ${n+1}`;
    } else if(type==='twoGap'){
      const n=Math.floor(Math.random()*(mx-4))+2;
      answer=n; // İlk boşuk cevap olsun
      slots=[{v:n-1,show:true},{v:n,show:false},{v:n+1,show:true},{v:n+2,show:false},{v:n+3,show:true}];
      question=`Dizideki iki boşluğa hangi sayılar gelir?`;
      hint=`${n-1}, ${n}, ${n+1}, ${n+2}, ${n+3}`;
    } else if(type==='sequence'){
      const start=Math.floor(Math.random()*(mx-5))+1;
      const pos=Math.floor(Math.random()*3)+1; // 1,2,3. pozisyon boşluk
      answer=start+pos;
      slots=Array.from({length:5},(_,i)=>({v:start+i,show:i!==pos}));
      question=`Sayı dizisindeki boşluğu tamamla:`;
      hint=slots.map(s=>s.v).join(', ');
    } else if(type==='backward'){
      const start=Math.floor(Math.random()*(mx-5))+6;
      const pos=Math.floor(Math.random()*3)+1;
      answer=start-pos;
      slots=Array.from({length:5},(_,i)=>({v:start-i,show:i!==pos}));
      question=`Geriye doğru sayıyoruz, boşluk ne?`;
      hint=slots.map(s=>s.v).join(', ');
    } else if(type==='skip2'){
      const start=Math.floor(Math.random()*Math.floor(mx/2))*2+2;
      const pos=Math.floor(Math.random()*3)+1;
      answer=start+pos*2;
      slots=Array.from({length:5},(_,i)=>({v:start+i*2,show:i!==pos}));
      question=`İkişer atlayarak sayıyoruz, boşluk ne?`;
      hint=slots.map(s=>s.v).join(', ');
    } else { // skip5
      const start=Math.floor(Math.random()*Math.floor(mx/5))*5+5;
      const pos=Math.floor(Math.random()*3)+1;
      answer=start+pos*5;
      slots=Array.from({length:5},(_,i)=>({v:start+i*5,show:i!==pos}));
      question=`Beşer atlayarak sayıyoruz, boşluk ne?`;
      hint=slots.map(s=>s.v).join(', ');
    }

    const o=[answer];let at=0;
    while(o.length<4&&at<40){
      const diff=Math.floor(Math.random()*5)+1;
      const v=Math.random()>0.5?answer+diff:answer-diff;
      if(!o.includes(v)&&v>=0)o.push(v);at++;
    }
    while(o.length<4)o.push(o.length+answer);
    return{type,slots:slots.filter(s=>s.v>=0),question,answer,hint,options:o.sort(()=>Math.random()-0.5)};
  };
  const prepG=(l)=>{setLv(l);setGs('ready');};

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Komşu Sayılar" colors={colors}/>
      
      {/* Sayı dizisi görseli */}

        {(p?.type==='backward'||p?.type==='skip2'||p?.type==='skip5')&&(
          <div className="text-center mt-2">
            <span className="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-600 font-medium">
              {p?.type==='backward'?'⬅ Geriye sayma':p?.type==='skip2'?'2şer atlama':'5er atlama'}
            </span>

      {/* Soru */}
      <div className="bg-white px-4 py-2 rounded-xl shadow mb-2 text-center max-w-sm">
        <div className="text-sm text-gray-700 font-medium">{p?.question}</div>
      </div>

      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.answer?'text-green-500':'text-orange-500'}`}>{ua===p?.answer?'✓ Doğru!':`${encourage()} Cevap: ${p?.answer}`}</div><div className="bg-amber-50 p-3 rounded-xl text-sm text-amber-700">💡 {p?.hint}</div></div>):(<div className="grid grid-cols-2 gap-3">{p?.options?.map((o,i)=>(<button key={i} onClick={()=>handle(o)} className={`px-8 py-4 ${colors?.button} text-white rounded-xl font-bold text-2xl shadow-lg`}>{o}</button>))}</div>)}
    </div>
  );
};

// ==================== C5: KOD ÇEVİRİCİ (Transkodlama - ÜKM) ====================
const KodCevirici = ({ onBack, colors, onGameComplete, rahatMod, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [p,setP]=useState(null);const [ua,setUa]=useState(null);
  const adaptive = useAdaptive();
  const nw=['','bir','iki','üç','dört','beş','altı','yedi','sekiz','dokuz','on',
    'on bir','on iki','on üç','on dört','on beş','on altı','on yedi','on sekiz','on dokuz','yirmi'];
  
  const renderCode=(val,type,sz='lg')=>{
    if(type==='digit') return <span className={`font-bold ${sz==='lg'?'text-5xl':'text-3xl'}`} style={{color:numColor(val)}}>{val}</span>;
    if(type==='word') return <span className={`font-bold text-purple-700 ${sz==='lg'?'text-2xl':'text-lg'} capitalize`}>{nw[val]||val}</span>;
    if(type==='dots') return <div className="flex flex-wrap justify-center gap-1" style={{maxWidth:sz==='lg'?120:80}}>
      {Array.from({length:val},(_,i)=><div key={i} className={`${sz==='lg'?'w-5 h-5':'w-4 h-4'} bg-indigo-500 rounded-full`}/>)}</div>;
    if(type==='tally'){const g=Math.floor(val/5),r=val%5;return <div className="flex gap-1 items-end">
      {Array.from({length:g},(_,i)=><span key={i} className="text-2xl font-bold text-indigo-700">卌</span>)}{r>0&&<span className="text-xl text-indigo-700">{'|'.repeat(r)}</span>}</div>;}
    if(type==='fingers') return <span className={sz==='lg'?'text-4xl':'text-2xl'}>{'✋'.repeat(Math.floor(val/5))}{'☝️'.repeat(val%5>0?1:0)}{val%5>1?`+${val%5-1}`:''}</span>;
    return <span>{val}</span>;
  };

  const codes = {1:['dots','digit'],2:['digit','word'],3:['dots','digit','word'],4:['dots','digit','word','tally']};
  const ranges = {1:{min:1,max:5},2:{min:1,max:10},3:{min:1,max:10},4:{min:1,max:20}};

  const gen=(l)=>{
    const r=ranges[l]; const val=Math.floor(Math.random()*(r.max-r.min+1))+r.min;
    const avail=codes[l]; const fromType=avail[Math.floor(Math.random()*avail.length)];
    let toType; do{toType=avail[Math.floor(Math.random()*avail.length)];}while(toType===fromType);
    // Seçenekler
    let opts=[val]; while(opts.length<4){const o=Math.floor(Math.random()*(r.max-r.min+1))+r.min;if(!opts.includes(o))opts.push(o);}
    opts.sort(()=>Math.random()-0.5);
    return {val,fromType,toType,opts};
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);adaptive.reset();setGs('playing');};
  const handle=(a)=>{setUa(a);adaptive.record(a===p?.val);if(a===p?.val){setSc(s=>s+15*lv);speakNumber(p.val);}setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1200);};

  const codeLabel={dots:'Nokta',digit:'Rakam',word:'Sözcük',tally:'Çetele'};
  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Kod Çevirici" emoji="🔄" description="Aynı sayıyı farklı biçimlerde tanı! Nokta↔Rakam↔Sözcük arasında çeviri yap." levels={['Sv1: Nokta↔Rakam (1-5)','Sv2: Rakam↔Sözcük (1-10)','Sv3: Üçlü Kod (1-10)','Sv4: Dörtlü Kod (1-20)']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Kod Çevirici" emoji="🔄" level={lv} instruction="Bir sayı gösterilecek (nokta, rakam veya sözcük olarak). Aynı sayının farklı gösterimini seçeneklerden bul!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Kod Çevirici" colors={colors}/>
      <div className="bg-white rounded-2xl shadow-xl p-4 mb-3 text-center min-h-[100px] flex flex-col items-center justify-center">
        <div className="text-xs text-gray-400 mb-2">{codeLabel[p?.fromType]} gösterimi:</div>
        {p && renderCode(p.val, p.fromType)}
      </div>
      <div className="text-sm text-gray-600 mb-2 font-medium">Bu sayının <span className="text-indigo-600 font-bold">{codeLabel[p?.toType]}</span> gösterimini bul:</div>
      {ua!==null?(<div className="text-center"><div className={`text-2xl font-bold mb-2 ${ua===p?.val?'text-green-500':'text-orange-500'}`}>{ua===p?.val?'✓ Doğru!':`${encourage()} Cevap:`}</div>
        <div className="flex items-center justify-center gap-3 bg-amber-50 p-3 rounded-xl">
          {renderCode(p.val,p.fromType,'sm')}<span className="text-xl text-gray-400">=</span>{renderCode(p.val,p.toType,'sm')}
        </div>
      </div>):(
      <div className="grid grid-cols-2 gap-3">{p?.opts?.map((o,i)=>(
        <button key={i} onClick={()=>handle(o)} className={`p-4 bg-white border-2 border-gray-200 rounded-2xl min-h-[80px] flex items-center justify-center shadow-lg hover:border-indigo-400 transition-all`}>
          {renderCode(o,p?.toType,'sm')}
        </button>
      ))}</div>)}
    </div>
  );
};


// ==================== D5: ZİHİNSEL DÖNDÜRME (Uzamsal Biliş) ====================
const ZihinselDondurme = ({ onBack, colors, onGameComplete, rahatMod, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [p,setP]=useState(null);const [ua,setUa]=useState(null);

  // Basit şekil desenleri (SVG path, asimetrik olmalı)
  const patterns = [
    {id:'L',path:'M10,10 L10,60 L35,60 L35,45 L25,45 L25,10 Z',name:'L şekli'},
    {id:'T',path:'M10,10 L50,10 L50,25 L35,25 L35,60 L25,60 L25,25 L10,25 Z',name:'T şekli'},
    {id:'Z',path:'M10,10 L30,10 L30,30 L50,30 L50,60 L30,60 L30,40 L10,40 Z',name:'Z şekli'},
    {id:'F',path:'M10,10 L40,10 L40,25 L25,25 L25,35 L35,35 L35,50 L25,50 L25,60 L10,60 Z',name:'F şekli'},
    {id:'P',path:'M10,10 L35,10 L35,35 L25,35 L25,60 L10,60 Z',name:'P şekli'},
    {id:'Arrow',path:'M30,5 L55,30 L40,30 L40,60 L20,60 L20,30 L5,30 Z',name:'Ok şekli'},
  ];

  const renderShape=(patternId,rotation,mirror=false,size=60,highlight=false)=>{
    const pat=patterns.find(p=>p.id===patternId)||patterns[0];
    return (<svg width={size} height={size} viewBox="0 0 60 65">
      <g transform={`translate(30,32.5) rotate(${rotation}) scale(${mirror?-1:1},1) translate(-30,-32.5)`}>
        <path d={pat.path} fill={highlight?'#10B981':'#6366F1'} stroke={highlight?'#059669':'#4338CA'} strokeWidth="2" opacity="0.9"/>
      </g>
    </svg>);
  };

  const gen=(l)=>{
    const pat=patterns[Math.floor(Math.random()*patterns.length)];
    const baseRot=[0,90,180,270][Math.floor(Math.random()*4)];
    const rots=l<=2?[90,180,270]:[45,90,135,180,225,270,315];
    // Doğru cevap: aynı şekil, farklı açıda döndürülmüş
    const correctRot=(baseRot+rots[Math.floor(Math.random()*rots.length)])%360;
    // Yanlış cevaplar: aynalı (mirror) versiyonlar
    const opts=[{rot:correctRot,mirror:false,correct:true}];
    const usedRots=[correctRot];
    for(let i=0;i<3;i++){
      let r; do{r=(baseRot+rots[Math.floor(Math.random()*rots.length)])%360;}while(usedRots.includes(r)&&usedRots.length<rots.length);
      usedRots.push(r);
      opts.push({rot:r,mirror:l>=2?Math.random()>0.4:Math.random()>0.7,correct:false});
    }
    return {patId:pat.id,baseRot,opts:opts.sort(()=>Math.random()-0.5),correctIdx:0};
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);setP(gen(l));setUa(null);setGs('playing');};
  const handle=(i)=>{const correct=p?.opts[i]?.correct;setUa(i);if(correct)setSc(s=>s+15*lv);setTimeout(()=>{if(rd<TOTAL_ROUNDS){setRd(r=>r+1);setP(gen(lv));setUa(null);}else setGs('results');},1200);};

  if(gs==='menu') return <MenuScreen onBack={onBack} onStart={prepG} title="Zihinsel Döndürme" emoji="🔄" description="Şekli zihninde döndür! Hedef şeklin döndürülmüş halini bul, aynalı olanları ayırt et." levels={['Sv1: Kolay (90° adım)','Sv2: Orta (aynalı var)','Sv3: Zor (45° adım)','Sv4: Uzman']} colors={colors}/>;
  if(gs==='ready') return <ReadyScreen title="Zihinsel Döndürme" emoji="🔄" level={lv} instruction="Üstteki şekli zihninde döndür. Alttaki seçeneklerden aynı şeklin döndürülmüş halini bul! Aynalı olanlar YANLIŞ." colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;
  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Zihinsel Döndürme" colors={colors}/>
      <div className="bg-white rounded-2xl shadow-xl p-4 mb-3 text-center">
        <div className="text-xs text-gray-400 mb-1">Hedef şekil:</div>
        {p && renderShape(p.patId, p.baseRot, false, 80)}
      </div>
      <div className="text-sm text-gray-600 mb-2 font-medium">Aynı şeklin döndürülmüş halini bul:</div>
      <div className="grid grid-cols-2 gap-3">
        {p?.opts?.map((o,i)=>(
          <button key={i} onClick={()=>ua===null&&handle(i)} className={`p-3 bg-white border-2 rounded-2xl flex items-center justify-center shadow-lg transition-all ${
            ua!==null ? (o.correct ? 'border-green-400 bg-green-50' : i===ua ? 'border-orange-400 bg-orange-50' : 'border-gray-200') : 'border-gray-200 hover:border-indigo-400'
          }`}>
            {renderShape(p.patId, o.rot, o.mirror, 70, ua!==null && o.correct)}
            {ua!==null && o.mirror && <span className="absolute text-[10px] text-orange-500 font-bold">Aynalı</span>}
          </button>
        ))}
      </div>
      {ua!==null && <div className="mt-2 text-sm text-center">
        <div className={`font-bold ${p?.opts[ua]?.correct?'text-green-500':'text-orange-500'}`}>{p?.opts[ua]?.correct?'✓ Doğru! Şekli zihninde döndürebildin.':encourage()}</div>
        {!p?.opts[ua]?.correct && <div className="text-xs text-gray-500 mt-1">💡 Aynalı şekiller farklıdır. Şeklin köşelerine ve kenarlarına odaklan!</div>}
      </div>}
    </div>
  );
};

// ==================== D6: SİMETRİ AYNASI (Uzamsal İlişkiler) ====================
const SimetriAynasi = ({ onBack, colors, onGameComplete, rahatMod, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [p,setP]=useState(null);const [ua,setUa]=useState(null);

  // Basit 4x4 grid desenleri (1=dolu, 0=boş) — sol yarı gösterilir, sağ yarı simetrik olmalı
  const genPattern = (l) => {
    const sz = l <= 2 ? 3 : 4;
    const half = Math.floor(sz/2);
    // Sol yarıyı rastgele oluştur
    const left = [];
    for(let r=0;r<sz;r++){
      const row=[];
      for(let c=0;c<half;c++) row.push(Math.random() > (l<=1?0.5:0.4) ? 1 : 0);
      left.push(row);
    }
    // Doğru simetrik sağ yarı
    const right = left.map(row => [...row].reverse());
    // Yanlış seçenekler (1-2 hücre farklı)
    const makeWrong = () => {
      const w = left.map(row => [...row].reverse());
      const changes = l <= 2 ? 1 : 2;
      for(let i=0;i<changes;i++){
        const r=Math.floor(Math.random()*sz), c=Math.floor(Math.random()*half);
        w[r][c] = w[r][c] ? 0 : 1;
      }
      return w;
    };
    const opts = [{right, correct:true}];
    for(let i=0;i<3;i++) opts.push({right:makeWrong(), correct:false});
    return {left, sz, half, opts:opts.sort(()=>Math.random()-0.5), axis:l>=3?'yatay':'dikey'};
  };

  const renderGrid = (left, right, sz, half, small=false) => {
    const cs = small ? 10 : 14;
    const full = left.map((row,r) => [...row, ...(right ? right[r] : Array(half).fill(-1))]);
    return (<div className="inline-grid gap-0.5" style={{gridTemplateColumns:`repeat(${sz}, ${cs}px)`}}>
      {full.flat().map((cell,i) => {
        const col = i % sz;

const SayiDogrusuYurume = ({ onBack, colors, onGameComplete, rahatMod, prevBest }) => {
  const [gs,setGs]=useState('menu');const [lv,setLv]=useState(1);const [sc,setSc]=useState(0);const [rd,setRd]=useState(0);
  const [p,setP]=useState(null);const [pos,setPos]=useState(0);const [steps,setSteps]=useState(0);const [submitted,setSubmitted]=useState(false);

  const gen=(l)=>{
    let a,b,op,answer,max;
    if(l<=2){max=10;a=Math.floor(Math.random()*7)+1;b=Math.floor(Math.random()*Math.min(5,max-a))+1;op='+';answer=a+b;}
    else{max=l===3?15:20;
      if(Math.random()>0.4){a=Math.floor(Math.random()*(max-3))+2;b=Math.floor(Math.random()*Math.min(5,max-a))+1;op='+';answer=a+b;}
      else{a=Math.floor(Math.random()*(max-2))+3;b=Math.floor(Math.random()*Math.min(4,a-1))+1;op='-';answer=a-b;}
    }
    return {a,b,op,answer,max};
  };

  const prepG=(l)=>{setLv(l);setGs('ready');};
  const startG=(l)=>{setLv(l);setSc(0);setRd(1);const q=gen(l);setP(q);setPos(q.a);setSteps(0);setSubmitted(false);setGs('playing');};

  const step=(dir)=>{
    if(submitted) return;
    const newSteps=steps+1;
    setSteps(newSteps);
    setPos(prev=>Math.max(0,Math.min(p.max,prev+dir)));
  };

  const submit=()=>{
    setSubmitted(true);
    const correct=pos===p?.answer;
    if(correct){setSc(s=>s+20*lv);playSound('correct');speakNumber(pos);}
    else playSound('wrong');
    setTimeout(()=>{
      if(rd<TOTAL_ROUNDS){setRd(r=>r+1);const q=gen(lv);setP(q);setPos(q.a);setSteps(0);setSubmitted(false);}

  if(gs==='ready') return <ReadyScreen title="Sayı Yürüyüşü" emoji="🚶" level={lv} instruction="Sayı doğrusu üzerinde başlangıç noktasındasın. Ok butonlarıyla doğru sayıda adım atarak sonuca ulaş!" colors={colors} onStart={()=>startG(lv)} onBack={()=>setGs('menu')}/>;
  if(gs==='results') return <ResultScreen score={sc} onReplay={()=>startG(lv)} onBack={onBack} onLevelMenu={()=>setGs('menu')} colors={colors} onComplete={onGameComplete} level={lv} maxLevel={4} onNextLevel={startG} prevBest={prevBest}/>;

  const pct=p?(pos/p.max)*100:0;
  const startPct=p?(p.a/p.max)*100:0;
  const ansPct=p?(p.answer/p.max)*100:0;

  return (
    <div className={`h-screen ${colors?.bg} flex flex-col items-center p-3 overflow-hidden`}>
      <GameHeader onBack={onBack} onLevelMenu={()=>setGs('menu')} round={rd} score={sc} title="Sayı Yürüyüşü" colors={colors}/>
      <div className="bg-white rounded-2xl shadow-xl p-4 mb-3 text-center w-full max-w-sm">
        <div className="text-2xl font-bold text-purple-700 mb-1">{p?.a} {p?.op} {p?.b} = ?</div>
        <div className="text-sm text-gray-500">{p?.op==='+'?`${p?.a}'den ${p?.b} adım ileri yürü`:`${p?.a}'den ${p?.b} adım geri gel`}</div>
      </div>

      {/* Sayı Doğrusu */}
      <div className="w-full max-w-sm mb-3 px-2">
        <div className="relative h-16">
          {/* Çizgi */}
          <div className="absolute top-8 left-0 right-0 h-1 bg-gray-300 rounded"/>
          {/* Başlangıç işareti */}
          <div className="absolute top-5 h-7 w-0.5 bg-blue-400" style={{left:`${startPct}%`}}/>
          {/* Hedef işareti (submitted sonrası) */}
          {submitted && <div className="absolute top-5 h-7 w-0.5 bg-green-500" style={{left:`${ansPct}%`}}/>}
          {/* Yürüyen karakter */}
          <div className="absolute top-0 transition-all duration-300 -translate-x-1/2 text-center" style={{left:`${pct}%`}}>
            <div className="text-2xl">🚶</div>
            <div className="text-xs font-bold bg-white px-1 rounded shadow" style={{color:numColor(pos,p?.max||20)}}>{pos}</div>
          </div>
        </div>
        {/* Sayı etiketleri */}
        <div className="flex justify-between text-[10px] text-gray-400 mt-1">
          <span>0</span>
          {p?.max>=10&&<span>{Math.floor(p.max/2)}</span>}
          <span>{p?.max}</span>
        </div>

      {/* Kontroller */}
      {!submitted ? (
        <div className="flex flex-col items-center gap-2">
          <div className="flex items-center gap-3">

            <div className="text-center">
              <div className="text-xs text-gray-500">{steps} adım</div>

          </div>
        </div>
      )}
    </div>
  );
};

// ==================== BİLGİ GRAFİĞİ VE ADAPTİF MOTOR ====================
// Her oyunun test ettiği beceriler ve önkoşul ilişkileri
const SKILL_GRAPH = {
  // Temel beceriler
  subitizing: { name: 'Sanbil', games: ['A1','A2','A5','A6'], prereqs: [] },
  counting: { name: 'Sayma', games: ['A3','A4'], prereqs: ['subitizing'] },
  magnitude: { name: 'Büyüklük Algısı', games: ['C2','B3'], prereqs: ['subitizing'] },
  symbolRecog: { name: 'Sembol Tanıma', games: ['C1','C5'], prereqs: [] },
  placeValue: { name: 'Basamak Değeri', games: ['C4'], prereqs: ['symbolRecog','counting'] },
  estimation: { name: 'Tahmin', games: ['B1','B2','B4','B5'], prereqs: ['magnitude','subitizing'] },
  addition: { name: 'Toplama', games: ['E1','E2','E3','E5'], prereqs: ['counting','magnitude'] },
  division: { name: 'Bölme/Gruplama', games: ['E4'], prereqs: ['counting','addition'] },
  shapeRecog: { name: 'Şekil Tanıma', games: ['D1','D2'], prereqs: [] },
  spatialRel: { name: 'Uzamsal İlişkiler', games: ['D3','D4','D5','D6'], prereqs: ['shapeRecog'] },
  transcoding: { name: 'Kodlar Arası Çeviri', games: ['C3','C5'], prereqs: ['symbolRecog','magnitude'] },
};

// Basitleştirilmiş mastery tahmini (0-1 arası)
const calcMastery = (skillId, progress) => {
  const skill = SKILL_GRAPH[skillId];
  if(!skill) return 0;
  const played = skill.games.filter(id => progress[id]);
  if(played.length === 0) return 0;
  const avgStars = played.reduce((s,id) => s + (progress[id]?.stars || 0), 0) / (played.length * 3);
  return Math.min(1, avgStars);
};

// Önkoşullar karşılanmış mı?
const prereqsMet = (skillId, progress) => {
  const skill = SKILL_GRAPH[skillId];
  if(!skill) return false;
  return skill.prereqs.every(p => calcMastery(p, progress) >= 0.3);
};

// En iyi sonraki oyunu öner (Bayesian-inspired)
const recommendNext = (progress) => {
  let bestGame = null, bestScore = -1;
  Object.entries(SKILL_GRAPH).forEach(([skillId, skill]) => {
    const mastery = calcMastery(skillId, progress);
    const ready = prereqsMet(skillId, progress);
    if(!ready && skill.prereqs.length > 0) return; // Önkoşul karşılanmadı
    if(mastery >= 0.9) return; // Zaten ustalaşmış
    // Öğrenme bölgesinde olan beceriler öncelikli (ZPD)
    const priority = mastery < 0.3 ? 3 : mastery < 0.6 ? 5 : 2; // 0.3-0.6 arası en verimli
    if(priority > bestScore) {
      // Bu becerinin en az oynanan oyununu bul
      const leastPlayed = skill.games.sort((a,b) => (progress[a]?.attempts||0) - (progress[b]?.attempts||0))[0];
      if(leastPlayed && GAMES[leastPlayed]) { bestGame = leastPlayed; bestScore = priority; }
    }
  });
  return bestGame;
};

const checkBadges = (progress) => {
  const earned = [];
  const games = Object.entries(GAMES);
  for(const b of BADGES) {
    if(b.cat === 'attempts') {
      const total = Object.values(progress).reduce((s,g) => s + (g.attempts||0), 0);
      if(total >= b.minAttempts) earned.push(b);
    } else if(b.cat === '*') {
      const all = games.every(([id]) => (progress[id]?.stars || 0) >= b.minStars);
      if(all) earned.push(b);
    } else {
      const catGames = games.filter(([,g]) => g.cat === b.cat);
      const allDone = catGames.every(([id]) => (progress[id]?.stars || 0) >= b.minStars);
      if(allDone && catGames.length > 0) earned.push(b);
    }
  }
  return earned;
};

const getUsers = () => {
  try { return JSON.parse(localStorage.getItem('matbil_users') || '[]'); } catch { return []; }
};
const saveUser = (user) => {
  const users = getUsers();
  if (!users.find(u => u.id === user.id)) { users.push(user); localStorage.setItem('matbil_users', JSON.stringify(users)); }
};
