<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6366F1" />
  <meta name="application-name" content="MatBilis" />
  <meta name="apple-mobile-web-app-title" content="MatBilis" />
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  <meta name="description" content="Sayı hissinden şekil algısına - diskalkuli için eğitsel matematik oyunları" />
  <title>Matematiksel Bilişin Temelleri</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service worker yalnız web sürümünde kayıt ol — Capacitor (file:// / https://localhost)
    // üzerinde tarayıcı kendi cache'ini yönetir.
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('%BASE_URL%sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
